<script>
// Data source: static JSON embedded above, authored by @jordanlyall.
// No user input reaches the DOM. All values pass through esc() before insertion.
(function () {
  var data = JSON.parse(document.getElementById('stack-data').textContent);

  function esc(s) {
    return s == null ? '' : String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Deck
  document.getElementById('deck-text').textContent = data.description;

  // Updated label
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var d = new Date(data.updated);
  document.getElementById('updated-label').textContent =
    months[d.getUTCMonth()] + ' ' + d.getUTCFullYear() + ' \u2014 v' + data.version;

  // Stats
  var statsRows = [
    { v: data.stats.volume_9mo,   l: 'Volume (9mo)' },
    { v: data.stats.transactions, l: 'Transactions'  },
    { v: data.stats.annualized,   l: 'Annualized'    }
  ];
  document.getElementById('stats-container').innerHTML = statsRows.map(function(s) {
    return '<div><div class="num-v">' + esc(s.v) + '</div><div class="num-l">' + esc(s.l) + '</div></div>';
  }).join('');

  // Stack
  var stackEl = document.getElementById('stack-container');
  var layerOrder = ['L5','L4','L3','L2','L1','L0'];
  layerOrder.forEach(function(lid) {
    var layer = data.layers.filter(function(l) { return l.id === lid; })[0];
    if (!layer) return;
    var num = lid.replace('L','').replace(/^(\d)$/, '0$1');
    var tags = layer.projects.map(function(p) {
      var cls = 't';
      var inner = esc(p.name);
      if (p.status === 'early')    { cls = 't early'; }
      else if (p.status === 'announced') { cls = 't ann'; }
      else if (p.status === 'acquired')  {
        cls = 't acq';
        if (p.acquisition_value) inner += '<span class="sm">' + esc(p.acquisition_value) + '</span>';
      }
      if (p.metadata && p.status !== 'acquired') {
        inner += '<span class="sm">' + esc(p.metadata) + '</span>';
      }
      if (p.id) {
        return '<a href="/projects?id=' + esc(p.id) + '" class="' + cls + '" style="text-decoration:none;">' + inner + '</a>';
      }
      return '<span class="' + cls + '">' + inner + '</span>';
    }).join('');

    var row = document.createElement('div');
    row.className = 'row';
    row.setAttribute('data-layer', lid);
    row.innerHTML =
      '<div class="row-label">' +
        '<span class="row-n">' + esc(num) + '</span>' +
        '<div>' +
          '<div class="row-title">' + esc(layer.name) + '</div>' +
          '<div class="row-q">' + esc(layer.question) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="row-content">' + tags + '</div>';
    stackEl.appendChild(row);
  });

  // Vertical integration
  var allLayers = ['L0','L1','L2','L3','L4','L5'];
  var viEl = document.getElementById('vi-container');
  var viHtml = '';
  data.vertical_integration.forEach(function(co) {
    var indices = co.layers.map(function(l) { return allLayers.indexOf(l); });
    var minI = Math.min.apply(null, indices);
    var maxI = Math.max.apply(null, indices);
    var leftPct  = (minI / 6 * 100).toFixed(1) + '%';
    var rightPct = ((5 - maxI) / 6 * 100).toFixed(1) + '%';
    var dots = allLayers.map(function(l) {
      var active = co.layers.indexOf(l) !== -1;
      return '<div class="vi-dot">' +
        (active ? '<div style="width:8px;height:8px;border-radius:50%;background:' + esc(co.color) + '"></div>' : '') +
        '</div>';
    }).join('');
    viHtml +=
      '<div class="vi-row">' +
        '<div class="vi-name" style="color:' + esc(co.color) + '">' + esc(co.name) + '</div>' +
        '<div class="vi-track">' +
          '<div class="vi-fill" style="left:' + leftPct + ';right:' + rightPct + ';background:' + esc(co.color) + '"></div>' +
          '<div class="vi-dots">' + dots + '</div>' +
        '</div>' +
      '</div>';
  });
  viHtml += '<div class="vi-labels">' + allLayers.map(function(l) { return '<span>' + l + '</span>'; }).join('') + '</div>';
  viEl.innerHTML = viHtml;

  // Consolidation
  var maEl = document.getElementById('ma-container');
  maEl.innerHTML = '<ul class="ma-list">' +
    data.consolidation.map(function(m) {
      return '<li>' + esc(m.acquirer) + ' <span class="arr">&rarr;</span> ' + esc(m.target) +
        (m.value ? ' <span class="pr">' + esc(m.value) + '</span>' : '') + '</li>';
    }).join('') +
    '</ul>';
}());
</script>
