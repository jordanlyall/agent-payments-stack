  * { margin:0; padding:0; box-sizing:border-box; }

  /* Nav */

  .topbar-links .tl-active { color:var(--text); }

  /* Graph wrap */

  #graph-svg { width:100%; height:100%; cursor:grab; }

  /* Legend */
  .legend {
    position:absolute; top:20px; left:20px;
    background:rgba(13,12,11,0.88); border:1px solid var(--faint);
    border-radius:6px; padding:14px 16px; backdrop-filter:blur(8px);
    min-width:180px;
  }
  .legend-title {
    font-family:'JetBrains Mono',monospace; font-size:8px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.12em; color:var(--muted);
    margin-bottom:10px;
  }
  .legend-item {
    display:flex; align-items:center; gap:8px; padding:4px 0; cursor:pointer;
    transition:opacity 0.15s;
  }
  .legend-item.dim { opacity:0.35; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .legend-label { font-size:11px; color:var(--secondary); }
  .legend-count { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); margin-left:auto; padding-left:8px; }

  .legend-divider { border-top:1px solid var(--faint); margin:10px 0 8px; }
  .legend-status { display:flex; flex-direction:column; gap:4px; }
  .legend-status-row { display:flex; align-items:center; gap:7px; }
  .legend-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .legend-status-label { font-size:10px; color:var(--muted); }

  /* Search */

    position:absolute; top:20px; right:20px;
    display:flex; gap:8px; align-items:center;
  }
  #graph-search {
    background:rgba(13,12,11,0.88); border:1px solid rgba(255,255,255,0.1);
    border-radius:5px; padding:6px 12px; font-size:12px; color:var(--text);
    font-family:'Space Grotesk',sans-serif; width:200px; outline:none;
    backdrop-filter:blur(8px); transition:border-color 0.15s, width 0.2s;
  }
  #graph-search:focus { border-color:rgba(255,255,255,0.22); width:240px; }
  #graph-search::placeholder { color:var(--muted); }
  .search-count {
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted);
    white-space:nowrap;
  }

  /* Tooltip */
  .gtooltip {
    position:absolute; pointer-events:none; display:none;
    background:rgba(13,12,11,0.95); border:1px solid rgba(255,255,255,0.1);
    border-radius:5px; padding:10px 12px; max-width:260px;
    backdrop-filter:blur(8px); z-index:10;

  .gtt-status { display:inline-block; margin-top:6px; font-family:'JetBrains Mono',monospace; font-size:8px; text-transform:uppercase; letter-spacing:0.08em; padding:2px 7px; border-radius:3px; }

  .gtt-status.announced { background:rgba(255,255,255,0.06); color:var(--muted); }

  /* Detail panel */

    position:absolute; right:0; top:0; height:100%; width:300px;
    background:rgba(13,12,11,0.97); border-left:1px solid var(--faint);

    z-index:5;

  .dp-close {
    position:absolute; top:12px; right:12px; width:28px; height:28px;
    display:flex; align-items:center; justify-content:center;

    background:transparent; border:none; font-size:16px;

</style>

x":"SuiNetwork","docs":"https://docs.sui.io"},{"layer":"L0","id":"polygon","name":"Polygon","status":"live","description":"Ethereum scaling network with PoS and ZK rollup options. Low-fee settlement for agent payment transactions.","launched":"2021-05","tags":["open-source","onchain","developer"],"url":"https://polygon.technology","x":"0xPolygon","docs":"https://docs.polygon.technology"},{"layer":"L0","id":"bnb-chain","name":"BNB Chain","status":"live","description":"Binance's EVM-compatible L1. High throughput and low fees; significant agent payment volume especially in Asia.","launched":"2020-09","tags":["onchain","developer"],"url":"https://www.bnbchain.org","x":"BNBCHAIN","docs":"https://docs.bnbchain.org"},{"layer":"L0","id":"gnosis","name":"Gnosis","status":"live","description":"EVM chain optimized for stablecoin transactions. Home of Safe smart accounts; widely used in agent treasury setups.","launched":"2018","tags":["open-source","onchain","developer"],"url":"https://www.gnosis.io","x":"gnosischain","docs":"https://docs.gnosischain.com"},{"layer":"L0","id":"near","name":"NEAR","status":"early","description":"Layer 1 with account abstraction native to the protocol. Early-stage but architecturally well-suited for agent payment patterns.","launched":"2020-10","tags":["open-source","onchain","developer"],"url":"https://near.org","x":"NEARProtocol","docs":"https://docs.near.org"},{"layer":"L0","id":"avalanche","name":"Avalanche","status":"live","description":"High-throughput EVM-compatible L1 with subnet architecture. Used for enterprise agent payment settlement.","launched":"2020-09","tags":["open-source","onchain","developer"],"url":"https://www.avax.network","x":"avax","docs":"https://docs.avax.network"},{"layer":"L0","id":"kite","name":"Kite","status":"live","url":"https://gokite.ai","description":"EVM-compatible Layer 1 purpose-built for autonomous AI agent payment settlement ($33M+, PayPal Ventures). Provides programmable spend rules and coordination infra access","announced":"Publicly announced, not yet shipped","acquired":"Acquired — operating under parent company"}}</script>

<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script>
(function(){

var LAYERS = {
  L5: { name:'Application',           color:'#c97ab8', yFrac:0.10 },
  L4: { name:'Governance & Policy',   color:'#d9a040', yFrac:0.26 },
  L3: { name:'Payment Protocol',      color:'#50b87c', yFrac:0.43 },
  L2: { name:'Routing & Abstraction', color:'#50a8d8', yFrac:0.59 },
  L1: { name:'Wallet & Key Mgmt',     color:'#9070d8', yFrac:0.75 },
  L0: { name:'Settlement',            color:'#5070d8', yFrac:0.90 },
};

var STATUS_COLOR = {
  live:      '#3d9e5f',
  early:     '#c99e32',
  announced: '#685e58',
  acquired:  '#d9613f',
};

// Load data
var raw = document.getElementById('aps-data');
var data;
try { data = JSON.parse(raw.textContent); } catch(e) { document.getElementById('graph-stats').textContent = 'Error loading data.'; return; }
if (!data || !data.layers) { document.getElementById('graph-stats').textContent = 'No data.'; return; }

// Build project lookup
var projectMap = {};
data.layers.forEach(function(l){ l.projects.forEach(function(p){ projectMap[p.id] = p; }); });

// Build nodes
var nodes = [];
// Layer hub nodes
Object.keys(LAYERS).forEach(function(lid){
  nodes.push({ id:lid, type:'layer', layer:lid, name:LAYERS[lid].name, color:LAYERS[lid].color });
});
// Project nodes
data.layers.forEach(function(l){
  l.projects.forEach(function(p){
    var nodeColor = LAYERS[p.layer] ? LAYERS[p.layer].color : '#685e58';
    nodes.push({
      id:p.id, type:'project', layer:p.layer, name:p.name, status:p.status||'live',
      description:p.description||'', color:nodeColor, data:p,
    });
  });
});

// Build links
var nodeIds = new Set(nodes.map(function(n){ return n.id; }));
var links = [];
// Project → layer hub edges
data.layers.forEach(function(l){
  l.projects.forEach(function(p){
    links.push({ source:p.id, target:p.layer, type:'layer' });
  });
});
// Related edges (deduped)
var relatedSet = new Set();
data.layers.forEach(function(l){
  l.projects.forEach(function(p){
    if (!p.related) return;
    p.related.forEach(function(r){
      if (!nodeIds.has(r)) return;
      var key = [p.id, r].sort().join('|');
      if (!relatedSet.has(key)) {
        relatedSet.add(key);
        links.push({ source:p.id, target:r, type:'related' });
      }
    });
  });
});

// Build legend
var legendEl = document.getElementById('legend');
var layerOrder = ['L5','L4','L3','L2','L1','L0'];
var hiddenLayers = new Set();
var legendItems = {};
layerOrder.forEach(function(lid){
  var count = (data.layers.find(function(l){ return l.id===lid; })||{projects:[]}).projects.length;
  var item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML =
    '<div class="legend-dot" style="background:'+LAYERS[lid].color+'"></div>'+
    '<div class="legend-label">'+lid+' · '+LAYERS[lid].name.split(' ')[0]+'</div>'+
    '<div class="legend-count">'+count+'</div>';
  item.addEventListener('click', function(){ toggleLayer(lid, item); });
  legendEl.insertBefore(item, legendEl.querySelector('.legend-divider'));
  legendItems[lid] = item;
});

function toggleLayer(lid, item){
  if (hiddenLayers.has(lid)) {
    hiddenLayers.delete(lid);
    item.classList.remove('dim');
  } else {
    hiddenLayers.add(lid);
    item.classList.add('dim');
  }
  applyLayerFilter();
}
function applyLayerFilter(){
  svg.selectAll('.node-project').style('opacity', function(d){
    if (hiddenLayers.has(d.layer)) return 0;
    return currentHighlight ? (highlightSet.has(d.id) ? 1 : 0.06) : (searchQuery ? (d._searchMatch ? 1 : 0.06) : 1);
  });
  svg.selectAll('.node-layer').style('opacity', function(d){
    return hiddenLayers.has(d.id) ? 0.2 : 1;
  });
  svg.selectAll('.link').style('opacity', function(d){
    var src = typeof d.source === 'object' ? d.source.id : d.source;
    var tgt = typeof d.target === 'object' ? d.target.id : d.target;
    var srcNode = nodeMap[src]; var tgtNode = nodeMap[tgt];
    if ((srcNode && hiddenLayers.has(srcNode.layer||srcNode.id)) || (tgtNode && hiddenLayers.has(tgtNode.layer||tgtNode.id))) return 0;
    return currentHighlight ? (highlightSet.has(src) && highlightSet.has(tgt) ? (d.type==='related'?0.7:0.25) : 0.03) : (d.type==='related' ? 0.5 : 0.1);
  });
}

// D3 setup
var w = window.innerWidth;
var h = window.innerHeight - 40;

var svg = d3.select('#graph-svg')
  .attr('width', w)
  .attr('height', h)
  .attr('viewBox', '0 0 ' + w + ' ' + h);
var container = svg.append('g').attr('class','graph-container');

// Zoom
svg.call(d3.zoom().scaleExtent([0.15, 4]).on('zoom', function(event){
  container.attr('transform', event.transform);
}));

// Pre-position layer hubs
var nodeMap = {};
nodes.forEach(function(n){ nodeMap[n.id] = n; });
nodes.forEach(function(n){
  if (n.type==='layer'){
    n.x = w/2; n.y = LAYERS[n.id].yFrac * h; n.fx = null; n.fy = null;
  } else {
    n.x = w/2 + (Math.random()-0.5)*200;
    n.y = LAYERS[n.layer] ? LAYERS[n.layer].yFrac * h + (Math.random()-0.5)*100 : h/2;
  }
});

// Simulation
var sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(function(d){ return d.id; })
    .distance(function(d){ return d.type==='layer' ? 90 : 150; })
    .strength(function(d){ return d.type==='layer' ? 0.4 : 0.9; })
  )
  .force('charge', d3.forceManyBody()
    .strength(function(d){ return d.type==='layer' ? -800 : -80; })
    .distanceMax(350)
  )
  .force('y', d3.forceY(function(d){
    if (d.type==='layer') return LAYERS[d.id].yFrac * h;
    return LAYERS[d.layer] ? LAYERS[d.layer].yFrac * h : h/2;
  }).strength(function(d){ return d.type==='layer' ? 1.0 : 0.25; }))
  .force('x', d3.forceX(w/2).strength(function(d){ return d.type==='layer' ? 0.12 : 0.015; }))
  .force('collide', d3.forceCollide(function(d){ return d.type==='layer' ? 44 : 10; }))
  .alphaDecay(0.025);

// Draw links
var link = container.append('g').attr('class','links')
  .selectAll('line')
  .data(links)
  .enter().append('line')
  .attr('class','link')
  .attr('stroke', function(d){
    if (d.type==='related'){
      // color mix of the two endpoints
      var srcN = nodeMap[typeof d.source==='object'?d.source.id:d.source];
      var tgtN = nodeMap[typeof d.target==='object'?d.target.id:d.target];
      return srcN ? srcN.color : '#98948f';
    }
    return 'rgba(255,255,255,0.12)';
  })
  .attr('stroke-width', function(d){ return d.type==='related' ? 1.2 : 0.6; })
  .attr('stroke-opacity', function(d){ return d.type==='related' ? 0.5 : 0.12; });

// Draw project nodes
var projectNodes = container.append('g').attr('class','proj-nodes')
  .selectAll('circle')
  .data(nodes.filter(function(n){ return n.type==='project'; }))
  .enter().append('circle')
  .attr('class','node-project')
  .attr('r', function(d){
    if (d.status==='acquired') return 5.5;
    if (d.status==='live') return 5;
    return 4;
  })
  .attr('fill', function(d){
    if (d.status==='acquired') return STATUS_COLOR.acquired;
    if (d.status==='early') return STATUS_COLOR.early;
    if (d.status==='announced') return STATUS_COLOR.announced;
    return d.color;
  })
  .attr('stroke', 'rgba(0,0,0,0.4)')
  .attr('stroke-width', 1)
  .style('cursor','pointer')
  .on('mouseenter', function(event, d){ onHoverNode(event, d, this); })
  .on('mouseleave', function(event, d){ onUnhoverNode(event, d, this); })
  .on('click', function(event, d){ event.stopPropagation(); openDetail(d); });

// Draw layer hub nodes
var layerNodes = container.append('g').attr('class','layer-nodes')
  .selectAll('g')
  .data(nodes.filter(function(n){ return n.type==='layer'; }))
  .enter().append('g')
  .attr('class','node-layer');

layerNodes.append('circle')
  .attr('r', 26)
  .attr('fill', function(d){ return d.color; })
  .attr('fill-opacity', 0.15)
  .attr('stroke', function(d){ return d.color; })
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.7);

layerNodes.append('text')
  .text(function(d){ return d.id; })
  .attr('text-anchor','middle')
  .attr('dominant-baseline','middle')
  .attr('dy','-4')
  .attr('font-family','JetBrains Mono, monospace')
  .attr('font-size','11')
  .attr('font-weight','600')
  .attr('fill', function(d){ return d.color; })
  .attr('pointer-events','none');

layerNodes.append('text')
  .text(function(d){ return LAYERS[d.id].name.split(' ')[0]; })
  .attr('text-anchor','middle')
  .attr('dominant-baseline','middle')
  .attr('dy','9')
  .attr('font-family','Space Grotesk, sans-serif')
  .attr('font-size','7')
  .attr('fill', function(d){ return d.color; })
  .attr('fill-opacity', 0.7)
  .attr('pointer-events','none');

// Tick
sim.on('tick', function(){
  link
    .attr('x1', function(d){ return d.source.x; })
    .attr('y1', function(d){ return d.source.y; })
    .attr('x2', function(d){ return d.target.x; })
    .attr('y2', function(d){ return d.target.y; });

  projectNodes
    .attr('cx', function(d){ return d.x; })
    .attr('cy', function(d){ return d.y; });

  layerNodes
    .attr('transform', function(d){ return 'translate('+d.x+','+d.y+')'; });
});

sim.on('end', function(){
  document.getElementById('graph-stats').textContent =
    nodes.filter(function(n){return n.type==='project';}).length+' projects · '+
    links.filter(function(l){return l.type==='related';}).length+' connections · click to explore';
});

// Stats while loading
document.getElementById('graph-stats').textContent =
  nodes.filter(function(n){return n.type==='project';}).length+' projects · '+
  links.filter(function(l){return l.type==='related';}).length+' connections · simulating...';

// -- Hover logic --
var currentHighlight = null;
var highlightSet = new Set();

function getNeighbors(nodeId){
  var s = new Set([nodeId]);
  links.forEach(function(l){
    var src = typeof l.source==='object'?l.source.id:l.source;
    var tgt = typeof l.target==='object'?l.target.id:l.target;
    if (src===nodeId) s.add(tgt);
    if (tgt===nodeId) s.add(src);
  });
  return s;
}

var tooltip = document.getElementById('gtooltip');

function onHoverNode(event, d, el){
  currentHighlight = d.id;
  highlightSet = getNeighbors(d.id);

  projectNodes.style('opacity', function(n){
    if (hiddenLayers.has(n.layer)) return 0;
    return highlightSet.has(n.id) ? 1 : 0.06;
  });
  layerNodes.style('opacity', function(n){
    return highlightSet.has(n.id) ? 1 : 0.15;
  });
  link.style('opacity', function(l){
    var src = typeof l.source==='object'?l.source.id:l.source;
    var tgt = typeof l.target==='object'?l.target.id:l.target;
    if (highlightSet.has(src) && highlightSet.has(tgt)) return l.type==='related'?0.8:0.3;
    return 0.03;
  });

  // Tooltip
  document.getElementById('gtt-name').textContent = d.name;
  var layerInfo = LAYERS[d.layer];
  document.getElementById('gtt-layer').textContent = d.layer + ' · ' + (layerInfo?layerInfo.name:'');
  var desc = d.description || '';
  document.getElementById('gtt-desc').textContent = desc.length>120 ? desc.substring(0,117)+'...' : desc;
  var statusEl = document.getElementById('gtt-status');
  statusEl.textContent = d.status||'live';
  statusEl.className = 'gtt-status '+(d.status||'live');
  tooltip.style.display = 'block';
  moveTooltip(event);
}

function onUnhoverNode(event, d, el){
  currentHighlight = null;
  highlightSet.clear();
  applyLayerFilter();
  tooltip.style.display = 'none';
}

wrap.addEventListener('mousemove', function(event){
  if (tooltip.style.display==='block') moveTooltip(event);
});

function moveTooltip(event){
  var x = event.offsetX + 16, y = event.offsetY - 10;
  if (x + 280 > w) x = event.offsetX - 280;
  if (y + 120 > h) y = event.offsetY - 120;
  tooltip.style.left = x+'px';
  tooltip.style.top = y+'px';
}

// -- Detail panel --
var panel = document.getElementById('detail-panel');
document.getElementById('dp-close').addEventListener('click', function(){ closeDetail(); });
svg.on('click', function(){ closeDetail(); });

function openDetail(d){
  var p = d.data;
  if (!p) return;
  var layerInfo = LAYERS[d.layer]||{};

  document.getElementById('dp-layer-badge').textContent = d.layer + ' · ' + (layerInfo.name||'');
  document.getElementById('dp-layer-badge').style.color = d.color;
  document.getElementById('dp-name').textContent = p.name;

  var statusEl = document.getElementById('dp-status');
  statusEl.textContent = p.status||'live';
  statusEl.className = 'dp-status '+(p.status||'live');

  document.getElementById('dp-desc').textContent = p.description||'';

  var editBlock = document.getElementById('dp-editorial');
  if (p.editorial) {
    document.getElementById('dp-editorial-text').textContent = p.editorial;
    editBlock.style.display = '';
  } else { editBlock.style.display = 'none'; }

  // Meta block
  var meta = '';
  if (p.launched) meta += '<div class="dp-meta-label">Launched</div><div class="dp-meta-val">'+p.launched+'</div>';
  if (p.funding) meta += '<div class="dp-meta-label">Funding</div><div class="dp-meta-val">'+p.funding+'</div>';
  if (p.chain) meta += '<div class="dp-meta-label">Chain</div><div class="dp-meta-val">'+p.chain+'</div>';
  document.getElementById('dp-meta-block').innerHTML = meta;

  // Tags
  var tagsBlock = document.getElementById('dp-tags-block');
  var tagsEl = document.getElementById('dp-tags');
  if (p.tags && p.tags.length) {
    tagsEl.innerHTML = p.tags.map(function(t){ return '<span class="dp-tag">'+t+'</span>'; }).join('');
    tagsBlock.style.display = '';
  } else { tagsBlock.style.display = 'none'; }

  // Related
  var relBlock = document.getElementById('dp-related-block');
  var relEl = document.getElementById('dp-related');
  if (p.related && p.related.length) {
    relEl.innerHTML = p.related.map(function(rid){
      var rp = projectMap[rid];
      return '<div class="dp-related-item" data-id="'+rid+'">'+(rp?rp.name:rid)+'</div>';
    }).join('');
    relEl.querySelectorAll('.dp-related-item').forEach(function(item){
      item.addEventListener('click', function(){
        var rid = item.dataset.id;
        var rn = nodeMap[rid];
        if (rn && rn.data) openDetail(rn);
      });
    });
    relBlock.style.display = '';
  } else { relBlock.style.display = 'none'; }

  // Links
  var linkBlock = document.getElementById('dp-link-block');
  var linkEl = document.getElementById('dp-link');
  var profileEl = document.getElementById('dp-profile-link');
  if (p.url || p.id) {
    if (p.url) { linkEl.href = p.url; linkEl.style.display = ''; } else { linkEl.style.display = 'none'; }
    profileEl.href = '/'+p.id;
    linkBlock.style.display = '';
  } else { linkBlock.style.display = 'none'; }

  panel.classList.add('open');
}

function closeDetail(){
  panel.classList.remove('open');
}

// -- Search --
var searchQuery = '';
document.getElementById('graph-search').addEventListener('input', function(e){
  searchQuery = e.target.value.toLowerCase().trim();
  var count = 0;
  nodes.forEach(function(n){
    if (n.type!=='project') return;
    var match = !searchQuery ||
      n.name.toLowerCase().indexOf(searchQuery)>=0 ||
      (n.description||'').toLowerCase().indexOf(searchQuery)>=0 ||
      ((n.data&&n.data.tags)||[]).some(function(t){ return t.indexOf(searchQuery)>=0; });
    n._searchMatch = match;
    if (match) count++;
  });
  document.getElementById('search-count').textContent = searchQuery ? count+' match'+(count===1?'':'es') : nodes.filter(function(n){return n.type==='project';}).length+' projects';
  if (!currentHighlight) applyLayerFilter();
});

// Drag
projectNodes.call(d3.drag()
  .on('start', function(event, d){
    if (!event.active) sim.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  })
  .on('drag', function(event, d){ d.fx = event.x; d.fy = event.y; })
  .on('end', function(event, d){
    if (!event.active) sim.alphaTarget(0);
    d.fx = null; d.fy = null;
  })
);

}());
</script>
