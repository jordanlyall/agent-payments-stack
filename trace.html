tion anyway."},{"layer":"L2","id":"crossmint-l2","name":"Crossmint","status":"live","description":"Multi-chain infrastructure for wallets, minting, and payments. Routes agent transactions across chains via REST API.","launched":"2021","tags":["api-native","developer","onchain"],"url":"https://www.crossmint.com","x":"crossmint","docs":"https://docs.crossmint.com","chain":"multi","funding":"$23.6M total","editorial":"Crossmint's REST-first routing layer solves a real problem: abstracting multi-chain complexity for agent payments without lock-in. Success hinges entirely on adoption velocity—routing layers only matter at scale, and the fragmented abstraction landscape offers competing alternatives like bridges and intents."},{"layer":"L2","id":"biconomy-dan","name":"Biconomy DAN","status":"live","description":"Decentralized Authorization Network for account abstraction. Routes agent transactions across chains with gas sponsorship.","launched":"2023","tags":["account-abstraction","open-source","developer","onchain"],"url":"https://www.biconomy.io","x":"biconomy","docs":"https://docs.biconomy.io","chain":"multi","editorial":"Biconomy DAN abstracts multichain fragmentation for AI agents through unified transaction routing with built-in gas sponsorship, eliminating per-chain wallet management. This solves agents' need for deterministic, cost-predictable execution across heterogeneous blockchains at the routing layer rather than application level. Early open-source positioning could establish DAN as critical infrastructure, though adoption hinges on whether agents actually require this abstraction versus competing settlement-layer solutions."},{"layer":"L2","id":"bvnk","name":"BVNK","status":"acquired","acquirer":"Mastercard","acquisition_value":"$1.8B","description":"Crypto payment infrastructure for enterprises. Acquired by Mastercard for $1.8B; bridges fiat and crypto payment rails.","launched":"2021","tags":["cross-border","b2b","enterprise","mastercard","offchain"],"history":[{"date":"2021","event":"launched"},{"date":"2025","event":"acquired","acquirer":"Mastercard","value":"$1.8B"}],"url":"https://bvnk.com","x":"BVNKFinance","chain":"multi","funding":"$93M total","acquirer_id":"mastercard-agentic-tokens","editorial":"Mastercard's $1.8B acquisition of BVNK reveals that enterprise agent payments prioritize institutional credibility and fiat on/off ramps over decentralization, favoring abstraction layers that hide blockchain complexity. The deal signals near-term value lies in compliance and legacy integration rather than peer-to-peer settlement innovation, potentially constraining the technology as agents scale beyond proof-of-concept."},{"layer":"L2","id":"unifold","name":"Unifold","status":"live","description":"Developer API (YC W26) abstracting multi-chain crypto deposits into under 10 lines of code. Enables agents to accept payments from Ethereum, Solana, Bitcoin, and more.","launched":"2025","tags":["api-native","developer","onchain"],"url":"https://unifold.io","x":"unifold_io","chain":"multi","funding":"$500K seed","editorial":"Unifold abstracts cross-chain payments for AI agents, but its $500K seed and 2025 launch face a fundamental test: whether developers will adopt a third-party consolidation layer or stick with single-chain logic for predictability. Its fate—acquisition by a major infrastructure player or failure—will reveal whether multi-chain payment abstraction is table-stakes for agents or whether they remain too chain-specific to justify routing middleware."},{"layer":"L2","id":"circle-cctp","name":"Circle CCTP","status":"live","description":"Circle's Cross-Chain Transfer Protocol for native USDC. Burn-and-mint bridging enabling fast USDC movement across chains.","launched":"2023-04","chain":["Ethereum","Avalanche","Base","Arbitrum","Solana"],"token":"USDC","tags":["open-source","cross-border","circle","onchain","developer"],"github":{"url":"https://github.com/circlefin/evm-cctp-contracts","stars":197,"last_commit":"2025-10-01","license":"Apache-2.0","as_of":"2026-03-26","forks":124,"contributors":15},"history":[{"date":"2023-04","event":"launched","note":"v1 on Ethereum and Avalanche"}],"url":"https://www.circle.com/cross-chain-transfer-protocol","x":"circle","docs":"https://developers.circle.com/cctp","funding":"$1.1B pre-IPO","editorial":"Native burn-and-mint USDC bridging across 9 chains. No wrapped tokens, no bridge risk. The clean-room solution for agents that need USDC on the right chain.","volume":{"value":13700000000,"unit":"usd","period":"30d","source":"circle.com Q4 2025 earnings","as_of":"2026-03-27","note":"Derived from $41B Q4 2025 CCTP volume / 3 months. Most recent official disclosure.","snapshots":[{"date":"2026-03","value":13700000000}]}},{"layer":"L2","id":"bridge","name":"Bridge","status":"acquired","acquirer":"Stripe","acquisition_value":"$1.1B","description":"Stablecoin infrastructure and cross-border payment rails. Acquired by Stripe for $1.1B.","launched":"2022","chain":["Ethereum","Solana","Base"],"token":"USDC","tags":["cross-border","stablecoin","b2b","stripe","offchain"],"history":[{"date":"2022","event":"launched"},{"date":"2024-10","event":"acquired","acquirer":"Stripe","value":"$1.1B"}],"url":"https://www.bridge.xyz","x":"Stablecoin","funding":"$58M pre-acquisition","editorial":"Acquired by Stripe for .1B in 2024. Stablecoin issuance and cross-border rails now part of the Stripe stack. Key for fiat-to-stablecoin conversion in agent payment flows.","acquirer_id":"stripe-spts"},{"layer":"L2","id":"across","name":"Across","status":"live","description":"Optimistic bridge protocol for fast cross-chain token transfers. Low-latency USDC bridging used in agent payment stacks. Ships Across Skills: a Claude Code skill and MCP server that lets agents get live bridge quotes and execute cross-chain transfers via tool calls.","launched":"2021","tags":["open-source","cross-border","onchain","developer","api-native"],"github":{"url":"https://github.com/across-protocol/contracts","stars":141,"last_commit":"2026-03-26","license":"BUSL-1.1","as_of":"2026-03-26","forks":79,"contributors":23},"volume":{"value":742540000,"unit":"usd","period":"30d","source":"on_chain","as_of":"2026-03-26","note":"DeFi Llama bridge volume","snapshots":[{"date":"2026-03","value":742540000}]},"url":"https://across.to","x":"AcrossProtocol","docs":"https://docs.across.to","chain":"multi","funding":"$51M total","npm":{"package":"@across-protocol/app-sdk","weekly_downloads":2936},"editorial":"Fastest USDC bridge by settlement time. Optimistic architecture (no ZK wait) makes it practical for agent payment flows that need cross-chain funds in seconds, not minutes. Across Skills (skills.across.to) extends this to agent-native tooling: a Claude Code skill and MCP server for live quotes and bridge execution via tool call. Combined with x402, covers receive → bridge → spend in a single agent context."},{"layer":"L2","id":"li-fi","name":"Li.Fi","status":"live","description":"Cross-chain DEX aggregator and bridge router. Finds optimal routes for token swaps and bridges across 30+ chains.","launched":"2021","tags":["open-source","cross-border","onchain","developer"],"github":{"url":"https://github.com/lifinance/contracts","stars":199,"last_commit":"2026-03-26","license":"LGPL-3.0","as_of":"2026-03-26","forks":99,"contributors":6},"related":["uniswap","across","kibble","coinbase-agentic-wallets"],"url":"https://li.fi","x":"lifiprotocol","docs":"https://docs.li.fi","chain":"multi","funding":"$51.7M total","npm":{"package":"@lifi/sdk","weekly_downloads":23713},"editorial":"Li.Fi routes cross-chain swaps for AI agents, solving fragmented liquidity at scale. Open-source design lets developers embed settlement without building bridge logic. Funding reflects confidence routing won't commoditize, but intent-based architectures and chain consolidation pose existential risk—Li.Fi must evolve into agent-native infrastructure or become obsolete."},{"layer":"L2","id":"socket","name":"Socket","status":"live","description":"Cross-chain interoperability protocol. Routes token transfers and messages across chains via the best available bridge.","launched":"2022","tags":["open-source","cross-border","onchain","developer"],"url":"https://socket.tech","x":"socketdottech","docs":"https://docs.socket.tech","chain":"multi","funding":"$10M total","editorial":"Socket solves multi-chain fragmentation by routing transfers across chains through a unified API, eliminating the need for agents to integrate dozens of bridge protocols individually. Its $10M funding signals proof-of-concept viability, but sparse adoption and unclear differentiation from competitors like Li.Fi mean developer traction will determine whether it becomes standard infrastructure or gets acquired."},{"layer":"L2","id":"debridge","name":"deBridge","status":"live","description":"Cross-chain messaging and liquidity protocol. Enables agents to trigger actions and move funds across EVM-compatible chains.","launched":"2021","tags":["open-source","cross-border","onchain","developer"],"github":{"url":"https://github.com/debridge-finance/debridge-contracts-v1","stars":57,"last_commit":"2025-09","license":"custom","as_of":"2026-03-26","forks":39,"contributors":10},"url":"https://debridge.finance","x":"deBridgeFinance","docs":"https://docs.debridge.com","chain":"multi","funding":"$5.5M seed","volume":{"value":197750000,"unit":"usd","period":"30d","source":"defillama.com/bridge/debridge","as_of":"2026-03-27","snapshots":[{"date":"2026-03","value":197750000}]},"editorial":"deBridge enables atomic cross-chain execution for multi-chain agents without settlement-layer wrapping, sitting at a critical junction where agents choose between local settlement and cross-chain coordination. Though established since 2021, its $5.5M seed funding disadvantages it against venture-backed competitors, raising questions about sustainability as a standalone routing layer versus absorption into larger protocols. For multi-chain agents, deBridge either becomes invisible infrastructure or another source of liquidity fragmentation."},{"layer":"L2","id":"wormhole","name":"Wormhole","status":"live","description":"Cross-chain messaging protocol connecting 20+ blockchains. Core infrastructure for multi-chain agent payment routing.","launched":"2021-09","tags":["open-source","cross-border","onchain","developer"],"github":{"url":"https://github.com/wormhole-foundation/wormhole","stars":1900,"last_commit":"2026-02-25","license":"Apache-2.0","as_of":"2026-03-26","forks":839,"contributors":77},"volume":{"value":1232743325,"unit":"usd","period":"30d","source":"wormholescan.io","as_of":"2026-03-26","snapshots":[{"date":"2026-03","value":1232743325}]},"history":[{"date":"2021-09","event":"launched","note":"Mainnet launch"}],"url":"https://wormhole.com","x":"wormhole","docs":"https://wormhole.com/docs","chain":"multi","funding":"$225M","editorial":"Wormhole provides essential cross-chain routing for agents but doesn't solve economic finality or settlement guarantees across chains. Its $225M funding masks an unresolved risk: whether enterprises will accept token-bridge vulnerabilities after repeated ecosystem exploits. For agent payments, it handles routing well but leaves liquidity risk and settlement certainty to upstream protocols."},{"layer":"L2","id":"layerzero","name":"LayerZero","status":"live","description":"Omnichain interoperability protocol. Enables agent payment messages and token transfers across any connected chain.","launched":"2022-03","tags":["open-source","cross-border","onchain","developer"],"github":{"url":"https://github.com/LayerZero-Labs/LayerZero-v2","stars":769,"last_commit":"2026-02-27","license":"MIT","as_of":"2026-03-26","forks":475,"contributors":20},"history":[{"date":"2022-03","event":"launched","note":"Mainnet v1 launch"}],"volume":{"value":8360000000,"unit":"usd","period":"30d","source":"layerzeroscan.com","as_of":"2026-03-26","snapshots":[{"date":"2026-03","value":8360000000}]},"url":"https://layerzero.network","x":"LayerZero_Labs","docs":"https://docs.layerzero.network","chain":"multi","funding":"$263M total","editorial":"Widest chain coverage (100+) for agent payment routing. Note: dual-licensed MIT + LZBL-1.2 — the commercial license is restrictive. Review before building a product on top."},{"layer":"L2","id":"jupiter","name":"Jupiter","status":"live","description":"Solana's primary DEX aggregator. Routes token swaps across all Solana liquidity sources for best execution.","launched":"2021","tags":["open-source","onchain","developer"],"chain":["Solana"],"url":"https://jup.ag","x":"JupiterExchange","docs":"https://station.jup.ag/docs","volume":{"value":8500000000,"unit":"usd","period":"30d","source":"discuss.jup.ag weekly reports Mar 2026","as_of":"2026-03-27","note":"$283M/day blended avg x 30d from official Jupiter weekly forum reports.","snapshots":[{"date":"2026-03","value":8500000000}]},"editorial":"Jupiter's dominance as Solana's routing layer creates invisible concentration risk for agents dependent on optimal swap execution, while its lack of cross-chain abstraction forces multi-chain strategies to cobble together separate solutions. Launched before the agent wave, Jupiter's vanilla swap optimization may misalign with emerging agent-specific demands like latency guarantees and MEV protection."},{"layer":"L2","id":"1inch","name":"1inch","status":"live","description":"EVM DEX aggregator routing across 300+ liquidity sources. Finds best swap rates for agent token conversions on-chain.","launched":"2019","tags":["open-source","onchain","developer"],"url":"https://1inch.io","x":"1inch","docs":"https://docs.1inch.io","chain":"multi","volume":{"value":10757000000,"unit":"usd","period":"30d","source":"defillama.com/protocol/1inch-network","as_of":"2026-03-27","note":"All chains via DeFi Llama.","snapshots":[{"date":"2026-03","value":10757000000}]},"editorial":"1inch's multi-chain routing across 300+ liquidity sources cuts slippage costs critical for agent micro-transactions, eliminating basis points that would erode margins. Its algorithmic pathfinding abstracts swap complexity agents would otherwise build themselves, making it essential infrastructure for deterministic payment settlement. An acquisition would signal legacy fintech sees agent settlement as material revenue, betting fragmented on-chain liquidity justifies the routing overhead."},{"layer":"L2","id":"uniswap","name":"Uniswap","status":"live","description":"Leading EVM DEX with programmatic swap APIs. Primary on-chain liquidity source for agent token swaps.","launched":"2018-11","chain":["Ethereum","Base","Arbitrum","Polygon"],"tags":["open-source","onchain","developer"],"github":{"url":"https://github.com/Uniswap/v4-core","stars":2500,"last_commit":"2025-10-23","license":"BUSL-1.1","as_of":"2026-03-26","forks":1300,"contributors":77},"volume":{"value":45772000000,"unit":"usd","period":"30d","source":"on_chain","as_of":"2026-03-26","note":"All versions (v2/v3/v4) via DeFi Llama","snapshots":[{"date":"2026-03","value":45772000000}]},"history":[{"date":"2018-11","event":"launched","note":"v1 on Ethereum"}],"url":"https://uniswap.org","x":"Uniswap","related":["across","kibble","li-fi","coinbase-agentic-wallets"],"docs":"https://docs.uniswap.org","funding":"$176M total","editorial":"Uniswap's depth and multi-chain tooling make it the default liquidity layer for agent token routing, positioning it as critical infrastructure for atomic, custodyless swaps. But its governance concentration—controlling fees, oracles, and incentives—creates a chokepoint that could throttle the entire agent payments ecosystem as volumes compound."},{"layer":"L2","id":"cow-protocol","name":"CoW Protocol","status":"live","description":"Intent-based DEX on Ethereum. Batches orders for MEV protection — useful for large agent settlement transactions.","launched":"2021","tags":["open-source","onchain","developer","batch"],"github":{"url":"https://github.com/cowprotocol/contracts","stars":154,"last_commit":"2026-03","license":"GPL-3.0","as_of":"2026-03-26","forks":53,"contributors":20},"url":"https://cow.fi","x":"CoWSwap","docs":"https://docs.cow.fi","chain":"multi","funding":"$23M token round","volume":{"value":7250000000,"unit":"usd","period":"30d","source":"cow.fi/learn/cow-dao-2025-in-review","as_of":"2026-03-27","note":"$87B annual 2025 volume monthly average. No confirmed March 2026 figure.","snapshots":[{"date":"2026-03","value":7250000000}]},"editorial":"CoW Protocol's batch auction mechanism eliminates MEV leakage for large programmatic trades, critical infrastructure as agents scale on-chain activity. Its 2021 launch and $23M funding validate genuine demand, but adoption hinges on agent frameworks making it default settlement rather than optional—and fragmentation across competing designs could erode network effects before standardization locks in."},{"layer":"L2","id":"moonpay","name":"MoonPay","status":"live","description":"Fiat-to-crypto onramp and payment routing. Provides agents access to 80+ payment methods and cross-border rails.","launched":"2019","tags":["moonpay","cross-border","b2b","consumer","offchain"],"url":"https://www.moonpay.com","x":"moonpay","docs":"https://dev.moonpay.com","chain":"multi","funding":"$555M Series A","editorial":"MoonPay abstracts 80+ payment methods into a single routing interface, solving the compliance burden that prevents global agents from accessing fiat rails directly. Its $555M valuation bets this becomes a defensible standard, though the real risk is becoming obsolete middleware as stablecoins and decentralized settlement mature—or being acquired by larger networks seeking to internalize agent payment infrastructure."},{"layer":"L2","id":"reqcast","name":"ReqCast","status":"live","url":"https://reqcast.com","description":"x402-based payment gateway that sits between AI agents and tool developers. Agents pay per API call in USDC; developers receive 95% instantly with zero payment code required. Live on Base mainnet.","launched":"2026-03","tags":["http","micropayment","api-native","developer","onchain","coinbase"],"chain":["Base"],"related":["x402","coinbase-agentic-wallets","elizaos"],"editorial":"ReqCast embeds micropayment settlement into HTTP headers via the x402 standard, eliminating SDK overhead for agentic workflows. By positioning itself as a transparent routing layer rather than competing on settlement, it makes per-call economics viable without forcing developers into payment infrastructure expertise. Success hinges on whether x402 adoption scales beyond ReqCast's control or remains isolated to its Base-mainnet gateway."},{"id":"kibble","layer":"L2","name":"Kibble","status":"early","url":"https://github.com/0xJim/kibble","description":"Cross-chain wallet funding skill for agents. Solves the cold-start problem: bridges USDC to the right chain via LI.FI before first payment. npm install kibble-pay.","tags":["cross-border","sdk","developer","open-source"],"related":["x402","coinbase-agentic-wallets","li-fi","elizaos"],"chain":"multi","x":"0xJim","github":{"url":"https://github.com/0xJim/kibble"},"npm":{"package":"kibble-pay"},"launched":"2026","added":"2026-03-27","editorial":"Kibble solves a real problem: agents need liquidity on specific chains before their first transaction. By abstracting cross-chain bridging as pre-payment rather than manual USDC positioning, it reduces deployment friction for multi-chain agent systems. Success depends on whether this becomes reflexive practice or remains optional when liquidity is already coordinated elsewhere."},{"id":"reveel","layer":"L2","name":"Reveel","status":"live","url":"https://reveel.id","description":"Cross-chain stablecoin payment network with human-readable Pay(ID) usernames. Receive any stablecoin on any chain, settle in preferred currency. Explicitly agent-native.","tags":["cross-border","api-native","agent-native","onchain"],"x":"r3vl_xyz","chain":"multi","funding":"$5.8M","launched":"2022","editorial":"Reveel abstracts chain and stablecoin fragmentation through username-based payments, letting agents receive USDC on Arbitrum and settle in USDT on Polygon automatically. Positioned between wallet abstraction and agent frameworks, its adoption directly determines how frictionless cross-chain agent payments become. The critical test: whether $5.8M TVL converts to real adoption over direct bridge-swaps, separating genuine infrastructure from a solution seeking a problem."},{"layer":"L2","id":"agently","name":"Agently","status":"early","description":"Routing and settlement layer for the agent economy. Handles agent-to-agent coordination and payment routing across rails.","url":"https://agently.hq","tags":["developer","onchain","b2b"],"editorial":"Positioning as the coordination and routing layer for multi-agent economies. Early-stage.","added":"2026-03-27"},{"layer":"L2","id":"kobaru","name":"Kobaru","status":"live","description":"Transparent proxy layer that adds an x402 paywall to any existing API without changing a single line of code. Supports both crypto (Solana) and fiat currency settlement.","url":"https://kobaru.io","chain":"Solana","tags":["developer","api-native","b2b"],"editorial":"Built by payment veterans. Retrofits x402 onto any existing API via reverse proxy — no code changes required. Unique dual settlement: crypto and fiat from the same layer.","added":"2026-03-27"},{"layer":"L2","id":"onchain","name":"Onchain","status":"early","description":"x402's Intelligent Intermediary Layer for Aggregating Facilitators. Routes x402 payments to the optimal underlying facilitator.","url":"https://onchain.fi","chain":"Base","tags":["developer","onchain","b2b"],"editorial":"Meta-facilitator concept: instead of picking one facilitator, Onchain aggregates them. Relevant as the x402 facilitator landscape fragments across chains and operators.","added":"2026-03-27"},{"layer":"L2","id":"1money","name":"1Money","status":"live","description":"Stablecoin banking infrastructure for programmable payments. Multi-currency on/off ramps, stablecoin-to-stablecoin swaps, and virtual accounts with local routing numbers. Zero platform fees, usage-based pricing.","url":"https://www.1money.com","tags":["api-native","developer","b2b","offchain"],"funding":"$23M","added":"2026-04-02"},{"layer":"L2","id":"better-money-company","name":"The Better Money Company","status":"announced","description":"Stablecoin clearinghouse that makes any stablecoin worth exactly $1 anywhere — solving the fragmentation problem the way ACH/Fedwire solved it for fiat. Coordination layer across issuers, wallets, and builders.","url":"https://bettermoney.co","funding":"$10M","tags":["offchain","b2b","enterprise","cross-border"],"launched":"2026","added":"2026-04-10"}]},{"id":"L1","name":"Wallet & Key Management","question":"Where the keys live","projects":[{"layer":"L1","id":"coinbase-agentic-wallets","name":"Coinbase Agentic Wallets","status":"live","description":"Server-side MPC wallets for AI agents. API-native, no seed phrase. Part of Coinbase Developer Platform.","launched":"2024-10","chain":["Base","Ethereum","Solana"],"token":"USDC","tags":["mpc","api-native","coinbase","developer","onchain"],"history":[{"date":"2024-10","event":"launched","note":"GA via Coinbase Developer Platform"}],"url":"https://coinbase.com","x":"coinbase","related":["x402","kibble","safe","elizaos","skyfire-kya"],"docs":"https://docs.cdp.coinbase.com/agentic-wallet/welcome","npm":{"package":"@coinbase/agentkit","weekly_downloads":3000},"editorial":"The reference implementation for agent wallets. Deep integration with x402 and Coinbase CDP. If you're building on x402, this is the path of least resistance for wallet provisioning."},{"layer":"L1","id":"moonpay-ows","name":"MoonPay OWS","status":"live","description":"MoonPay's Open Wallet Standard. Interoperable wallet infrastructure letting agents operate across multiple custodians.","launched":"2024","tags":["moonpay","api-native","b2b","developer"],"url":"https://openwallet.sh","chain":"multi","editorial":"MoonPay OWS solves wallet fragmentation by standardizing agent access across custodians through a single API, eliminating lock-in as agent frameworks scale. Early adoption could establish MoonPay as the standard for agent-wallet bridges, but success hinges on multi-custodian adoption beyond its own ecosystem."},{"layer":"L1","id":"crossmint-l1","name":"Crossmint","status":"live","description":"Multi-chain wallet and NFT custody infrastructure. Provides REST APIs for agent wallet creation and asset management.","launched":"2021","tags":["api-native","developer","onchain"],"url":"https://www.crossmint.com","x":"crossmint","docs":"https://docs.crossmint.com","chain":"multi","funding":"$23.6M total","npm":{"package":"@crossmint/client-sdk-react-ui","weekly_downloads":5799},"editorial":"Crossmint's API-first wallet infrastructure solves a critical problem: agents need programmable key management to transact autonomously without managing keys directly. With $23.6M backing and multi-chain focus, investors believe wallet fragmentation—not settlement protocols—is the real bottleneck for agent payments. The risk: major incumbents like Metamask and Coinbase could commoditize this layer once they add agent-native APIs."},{"layer":"L1","id":"thirdweb","name":"Thirdweb","status":"live","description":"Full-stack web3 development platform. Provides smart wallets, auth, and payment APIs for agent-integrated applications.","launched":"2021","tags":["open-source","sdk","developer"],"url":"https://thirdweb.com","x":"thirdweb","docs":"https://portal.thirdweb.com","chain":"multi","funding":"$29M total","npm":{"package":"thirdweb","weekly_downloads":34986},"editorial":"Thirdweb's embedded wallet SDKs reduce friction for agent payments by handling auth and key management without requiring web3 expertise—critical infrastructure since agent settlement depends on reliable transaction signing. The risk: wallet abstraction commoditizes as L2s mature, so Thirdweb's moat depends on developer lock-in or expanding into higher-margin settlement layers where it lacks exposure."},{"layer":"L1","id":"openfort","name":"Openfort","status":"live","description":"Gaming-focused smart wallet infrastructure. Provides session keys and spending policies for agent-controlled wallets.","launched":"2023","tags":["open-source","account-abstraction","sdk","developer"],"url":"https://www.openfort.io","x":"openfortxyz","docs":"https://www.openfort.io/docs","chain":"multi","funding":"$3M seed","npm":{"package":"@openfort/openfort-js","weekly_downloads":700},"editorial":"Openfort abstracts key management for gaming wallets, letting agents execute transactions via session keys without holding private keys—critical infrastructure for autonomous payments without custody risk. Its $3M seed and gaming focus suggest a narrow verticalization rather than broader agent finance, though the open-source SDK could seed wider adoption if session-key architecture becomes the standard for agent-controlled wallets across industries."},{"layer":"L1","id":"world-agentkit","name":"World AgentKit","status":"live","description":"World ID-verified agent wallet framework. Combines biometric identity with programmable agent spending controls.","launched":"2025","tags":["sdk","developer","onchain"],"url":"https://world.org","x":"worldcoin","docs":"https://docs.world.org/agents/agent-kit","chain":"multi","funding":"$250M total","editorial":"World AgentKit bets $250M that biometric identity, not applications, should control agent spending—prioritizing regulatory defensibility over capital efficiency. Success depends entirely on World ID adoption and Worldcoin's regulatory survival; failure leaves it as one alternative among many identity-agnostic competitors."},{"layer":"L1","id":"turnkey","name":"Turnkey","status":"live","description":"API-first key management infrastructure. MPC signing service for secure agent transaction authorization at scale.","launched":"2022","tags":["mpc","api-native","developer"],"url":"https://www.turnkey.com","x":"turnkeyhq","docs":"https://docs.turnkey.com","chain":"multi","funding":"$50M+ total","npm":{"package":"@turnkey/sdk-server","weekly_downloads":137506},"editorial":"Leading L1 by npm adoption — 137K weekly downloads. API-first MPC signing is the developer-preferred approach for agent key management. No seed phrases, no HSMs required."},{"layer":"L1","id":"privy","name":"Privy","status":"acquired","acquirer":"Stripe","description":"Embedded wallet infrastructure for consumer apps. Acquired by Stripe; now powers Stripe's wallet and auth stack.","launched":"2022","tags":["api-native","stripe","developer"],"history":[{"date":"2022","event":"launched"},{"date":"2025","event":"acquired","acquirer":"Stripe"}],"url":"https://www.privy.io","x":"privy_io","docs":"https://docs.privy.io","chain":"multi","funding":"$41M total","npm":{"package":"@privy-io/react-auth","weekly_downloads":128267},"editorial":"Acquired by Stripe in 2025. The embedded wallet SDK most consumer apps use. Now part of Stripe's agent commerce stack alongside Bridge and SPTs.","acquirer_id":"stripe-spts"},{"layer":"L1","id":"dynamic","name":"Dynamic","status":"acquired","acquirer":"Fireblocks","description":"Multi-chain auth and wallet SDK. Acquired by Fireblocks; brings consumer wallet UX to enterprise custody infrastructure.","launched":"2022","tags":["api-native","sdk","developer"],"history":[{"date":"2022","event":"launched"},{"date":"2025","event":"acquired","acquirer":"Fireblocks"}],"url":"https://www.dynamic.xyz","x":"dynamic_xyz","docs":"https://docs.dynamic.xyz","chain":"multi","funding":"$21M total","npm":{"package":"@dynamic-labs/sdk-react-core","weekly_downloads":34951},"acquirer_id":"fireblocks","editorial":"Fireblocks acquired Dynamic to add consumer-grade wallet UX and SDK distribution—signaling that institutional custody providers must offer seamless embedded payments to compete in an agent-native ecosystem. The bet: agent payment flows will route through institutional rails rather than consumer wallets, but only if custody providers simplify their complexity. The risk: Dynamic's developer-first positioning gets absorbed into Fireblocks' enterprise roadmap, ceding ground to faster-moving wallet SDKs."},{"layer":"L1","id":"lit-protocol","name":"Lit Protocol","status":"live","description":"Decentralized key management and threshold cryptography. Enables programmable signing conditions for agent wallets.","launched":"2021","tags":["open-source","mpc","developer"],"github":{"url":"https://github.com/LIT-Protocol/js-sdk","stars":158,"last_commit":"2026-02","license":"MIT","as_of":"2026-03-26","forks":89,"contributors":40},"url":"https://www.litprotocol.com","x":"LitProtocol","docs":"https://developer.litprotocol.com","chain":"multi","funding":"$17.5M total","npm":{"package":"@lit-protocol/lit-node-client","weekly_downloads":5478},"editorial":"Enables programmable signing conditions — agents can execute transactions only when specified conditions are met. Threshold cryptography without a central key custodian."},{"layer":"L1","id":"safe","name":"Safe","status":"live","description":"Smart account standard for EVM chains. Multi-sig and programmable spending rules; widely used in agent treasury management.","launched":"2018-02","chain":["Ethereum","Base","Arbitrum","Polygon"],"tags":["open-source","smart-contract","account-abstraction","onchain","developer"],"github":{"url":"https://github.com/safe-global/safe-smart-account","stars":2100,"last_commit":"2025-07-03","license":"LGPL-3.0","as_of":"2026-03-26","forks":1100,"contributors":30},"history":[{"date":"2018-02","event":"launched","note":"Launched as Gnosis Safe"},{"date":"2022-07","event":"rebranded","note":"Gnosis Safe rebranded to Safe"}],"url":"https://safe.global","x":"safe__global","related":["coinbase-agentic-wallets","thirdweb","fireblocks","elizaos"],"docs":"https://docs.safe.global","funding":"$100M strategic","npm":{"package":"@safe-global/protocol-kit","weekly_downloads":49434},"editorial":"The standard for programmable agent treasuries. Multi-sig + spending rules make it the default for agents holding meaningful funds. M strategic raise signals institutional adoption."},{"layer":"L1","id":"zerodev","name":"ZeroDev","status":"acquired","acquirer":"Arbitrum","description":"Account abstraction SDK and smart wallet provider. Acquired by Arbitrum; provides gasless transactions and session keys for agents.","launched":"2023","tags":["account-abstraction","sdk","developer"],"history":[{"date":"2023","event":"launched"},{"date":"2025","event":"acquired","acquirer":"Arbitrum"}],"github":{"url":"https://github.com/zerodevapp/kernel","stars":240,"last_commit":"2025-10","license":"MIT","as_of":"2026-03-26","forks":44,"contributors":15},"url":"https://zerodev.app","x":"zerodev_app","docs":"https://docs.zerodev.app","chain":"multi","funding":"$1M pre-seed","npm":{"package":"@zerodev/sdk","weekly_downloads":25720},"acquirer_id":"arbitrum","editorial":"Arbitrum's acquisition of ZeroDev signals account abstraction—specifically gasless transactions and session key management—is now essential for agent scaling. The move reflects both defensive positioning and recognition that chains must own developer UX layers, not just settlement speed. The risk: limited prior market validation could lock agent tooling into a single chain's incentives."},{"layer":"L1","id":"biconomy","name":"Biconomy","status":"live","description":"Account abstraction and smart wallet infrastructure. Gas sponsorship, batched transactions, and session keys for agent wallets.","launched":"2022","tags":["open-source","account-abstraction","sdk","developer"],"github":{"url":"https://github.com/bcnmy/nexus","stars":51,"last_commit":"2026-02","license":"MIT","as_of":"2026-03-26","forks":84,"contributors":20},"url":"https://www.biconomy.io","x":"biconomy","docs":"https://docs.biconomy.io","chain":"multi","funding":"$10.5M equity","npm":{"package":"@biconomy/abstractjs","weekly_downloads":6870},"editorial":"Mid-migration: biconomy-client-sdk (v4.5.7, deprecated) being replaced by @biconomy/abstractjs (v1.1.20, active). Newer package already has higher weekly downloads."},{"layer":"L1","id":"fireblocks","name":"Fireblocks","status":"live","description":"Institutional MPC custody and wallet infrastructure. Industry standard for enterprise-grade key management at scale.","launched":"2019","tags":["mpc","enterprise","b2b","offchain","permissioned"],"url":"https://fireblocks.com","x":"FireblocksHQ","docs":"https://developers.fireblocks.com","chain":"multi","funding":"$1B+ total","editorial":"Fireblocks owns enterprise wallet infrastructure by solving the impossible choice between expensive in-house key management and unacceptable custody risks through MPC—making them mandatory plumbing rather than a payment company. Five years and $1B+ funded, they've cemented dominance as the invisible dependency any serious agent payment stack needs for institutional adoption. The real risk isn't competition but whether their centralized approach becomes a bottleneck as real-time settlement demands outpace MPC latency."},{"layer":"L1","id":"alchemy","name":"Alchemy","status":"live","description":"EVM node infrastructure and smart wallet APIs. Provides account abstraction and transaction simulation for agent builders.","launched":"2019","tags":["api-native","sdk","developer"],"url":"https://www.alchemy.com","x":"AlchemyPlatform","docs":"https://docs.alchemy.com","chain":"multi","funding":"$564M total","npm":{"package":"alchemy-sdk","weekly_downloads":53754},"editorial":"alchemy-sdk deprecated Jan 2026 (archived). Users directed to @account-kit/core, Viem, or Solana Web3JS. Still 54K weekly npm downloads — significant legacy drag."},{"layer":"L1","id":"phantom","name":"Phantom","status":"live","description":"Multi-chain wallet with Solana focus. Increasingly relevant as Solana becomes a primary agent payment settlement chain.","launched":"2021","tags":["consumer","developer"],"chain":["Solana","Ethereum","Base"],"url":"https://phantom.com","x":"phantom","docs":"https://docs.phantom.com","funding":"$277M total","editorial":"Phantom dominates retail crypto wallets but lacks the custody models and signing speed that agent-to-agent settlement requires at scale, making its $277M valuation reflect consumer UI strength rather than infrastructure readiness. Solana's emergence as the agent settlement chain gives Phantom distribution leverage, yet the same momentum could fuel purpose-built alternatives if Phantom becomes a bottleneck. The real question: can Phantom evolve from consumer interface into reliable backend payment infrastructure, or will agents fork to specialized signers?"},{"layer":"L1","id":"walletconnect","name":"WalletConnect","status":"live","url":"https://walletconnect.com","description":"Open protocol for wallet-to-application connections. Enables agents to interact with any WalletConnect-compatible dApp.","launched":"2018","tags":["open-source","sdk","developer"],"x":"WalletConnect","docs":"https://docs.walletconnect.network","chain":"multi","npm":{"package":"@walletconnect/sign-client","weekly_downloads":853574},"editorial":"Rebranded to Reown. @walletconnect packages now under reown-npm-org. web3wallet deprecated in favor of Reown WalletKit."},{"layer":"L1","id":"dfns","name":"Dfns","status":"live","url":"https://dfns.co","description":"API-first MPC wallet infrastructure for developers. White-label key management with programmable signing policies for agents.","launched":"2020","tags":["mpc","enterprise","b2b","permissioned"],"x":"dfnsHQ","docs":"https://docs.dfns.co","chain":"multi","funding":"$29.5M total","npm":{"package":"@dfns/sdk","weekly_downloads":19326},"editorial":"Dfns built MPC-based key management that lets developers programmatically set signing policies instead of manually approving every transaction—essential for autonomous agents operating at scale. Their white-label, API-first infrastructure competes on policy flexibility and uptime rather than brand, the right positioning for a wallet layer. Early 2020 launch and $29.5M funding suggest enterprise stickiness, though MPC wallets face increasing commoditization pressure."},{"layer":"L1","id":"natural","name":"Natural","status":"early","url":"https://natural.co","description":"FDIC-insured accounts for AI agents with unified fiat and stablecoin balances ($9.8M seed). MCP integrations let agents autonomously send, receive, and manage payments.","launched":"2025","tags":["open-source","developer","onchain"],"editorial":"Natural addresses a real infrastructure gap by giving AI agents custody solutions bridging fiat and crypto payments—combining FDIC insurance with MCP protocol integration so agents can operate as autonomous economic actors rather than mere API consumers. The $9.8M seed and open-source approach signal conviction that agent payment infrastructure will standardize, but execution risk looms: FDIC-insured accounts for software entities remain legally untested, and adoption depends on whether developers actually need this layer or if agents simply settle through parent applications."},{"layer":"L1","id":"waap","name":"WaaP","status":"live","description":"Wallet as a Protocol — delegated capabilities for agents via programmable real-time policies without private key exposure. Millisecond signing via 2PC architecture.","tags":["delegation","policy","developer"],"url":"https://waap.xyz","editorial":"WaaP makes delegation and policy core primitives, letting agents execute transactions in milliseconds via 2PC signing without touching private keys—solving the operational security bottleneck that will sink most agent payment stacks. Adoption hinges on whether its policy framework becomes simpler than hand-rolled threshold schemes; success means standardizing agent-to-capital control the way HTTP did for the web."},{"layer":"L1","id":"frames","name":"Frames","status":"live","description":"Programmable wallet infrastructure for AI agents. Operators create and fund agent wallets, enforce spend and action policies, sponsor gas, and authorize tool usage. Supports x402 and MPP.","tags":["developer","b2b","http","onchain","api-native"],"url":"https://frames.ag/agentwallet","funding":"Colosseum"}]},{"id":"L0","name":"Settlement","question":"Where transactions land","projects":[{"layer":"L0","id":"base","name":"Base","status":"live","metadata":"119M txns","description":"Coinbase's Ethereum L2. Primary settlement chain for agent payments; 119M+ monthly transactions.","launched":"2023-07","tags":["coinbase","onchain","developer"],"volume":{"value":119000000,"unit":"transactions","period":"30d","source":"on_chain","as_of":"2026-03-26","snapshots":[{"date":"2026-03","value":119000000}]},"history":[{"date":"2023-07","event":"launched","note":"Mainnet launch"}],"url":"https://base.org","x":"base","docs":"https://docs.base.org","chain":"Base","editorial":"Dominant settlement chain for agent payments by transaction count. x402, Tempo, and most L3 protocols default to Base. Coinbase subsidy keeps gas near-zero for agents."},{"layer":"L0","id":"solana","name":"Solana","status":"live","metadata":"38.6M txns","description":"High-throughput L1 blockchain. Increasingly favored for agent micropayment settlement due to speed and low fees.","launched":"2020-03","tags":["open-source","onchain","developer"],"url":"https://solana.com","x":"solana","docs":"https://solana.com/docs","chain":"Solana","editorial":"Solana dominates agent micropayments because its sub-cent fees and sub-second finality beat Ethereum's cost structure—critical when agents execute thousands of daily transactions. This isn't technical superiority but economic arbitrage: 10x lower per-transaction costs compound into material profitability gains. The risk: Solana congestion could collapse the entire settlement layer without fallback infrastructure, leaving room for competitors optimizing agent-specific patterns."},{"layer":"L0","id":"ethereum","name":"Ethereum","status":"live","description":"The foundational smart contract platform. Settlement layer for most DeFi protocols and agent payment infrastructure.","launched":"2015-07","tags":["open-source","onchain","developer"],"url":"https://ethereum.org","x":"ethereum","docs":"https://ethereum.org/developers/docs","chain":"Ethereum","editorial":"Ethereum's network effects make it the de facto settlement layer for agent payments, but its throughput limits will fragment the market across incompatible L2s unless Layer 2 standardization and cross-chain atomic settlement become mandatory infrastructure—transforming a technical bottleneck into an existential threat to agent economics at scale."},{"layer":"L0","id":"tempo","name":"Tempo","status":"live","metadata":"$5B","description":"Regulated stablecoin payment network. $5B+ in transaction volume; focused on compliant cross-border settlement.","launched":"2023","tags":["api-native","developer","offchain"],"url":"https://tempo.xyz","x":"tempo","docs":"https://docs.tempo.xyz","editorial":"The only regulated stablecoin payment network built specifically for agent commerce. MPP (Machine Payments Protocol), co-developed with Stripe, is the off-chain counterpart to x402. B+ volume predates the agent focus."},{"layer":"L0","id":"arbitrum","name":"Arbitrum","status":"live","description":"Ethereum L2 with the largest DeFi TVL. Low-cost settlement layer for agent transactions requiring EVM compatibility.","launched":"2021-08","tags":["open-source","onchain","developer"],"url":"https://arbitrum.io","x":"arbitrum","docs":"https://docs.arbitrum.io","chain":"Arbitrum","editorial":"Arbitrum's L2 dominance makes it the default agent settlement layer, but concentration creates dependency risks: agents inherit sequencer vulnerabilities and bridging hazards rather than true finality. Arbitrum's governance must rapidly add agent-specific primitives—atomic multi-hop settlements, programmable payment conditions—before competitors fragment the market. Without them, Arbitrum risks becoming a lowest-common-denominator base while specialized protocols abstract away its relevance."},{"layer":"L0","id":"sui","name":"Sui","status":"live","description":"High-throughput L1 with object-centric model. Emerging agent payment settlement chain with sub-second finality.","launched":"2023-05","tags":["open-source","onchain","developer"],"url":"https://sui.io","x":"SuiNetwork","docs":"https://docs.sui.io","editorial":"Sui's parallel execution and sub-second finality theoretically suit high-frequency agent payments better than older L1s, but adoption remains confined to Move developers and early Sui backers—making it vulnerable to fragmentation rather than proving settlement superiority. The architecture's advantages only materialize with sufficient liquidity and routing infrastructure, neither present at scale today."},{"layer":"L0","id":"polygon","name":"Polygon","status":"live","description":"Ethereum scaling network with PoS and ZK rollup options. Low-fee settlement for agent payment transactions.","launched":"2021-05","tags":["open-source","onchain","developer"],"url":"https://polygon.technology","x":"0xPolygon","docs":"https://docs.polygon.technology","editorial":"Polygon's dual scaling approach makes it viable for agent micropayments where fees matter more than decentralization, but its pivot toward zkEVM fragments its architecture and complicates settlement guarantees. The real test is whether its fee advantage survives Ethereum's scaling maturation and whether agent systems can tolerate the latency and bridge complexity of multi-chain settlement."},{"layer":"L0","id":"bnb-chain","name":"BNB Chain","status":"live","description":"Binance's EVM-compatible L1. High throughput and low fees; significant agent payment volume especially in Asia.","launched":"2020-09","tags":["onchain","developer"],"url":"https://www.bnbchain.org","x":"BNBCHAIN","docs":"https://docs.bnbchain.org","editorial":"BNB Chain dominates Asian agent settlement through Binance's liquidity and distribution, not technical innovation—making it infrastructure-critical but structurally dependent on Binance's regulatory standing. Its sub-cent fees and high throughput became the de facto payment layer for agent networks, yet concentration risk means disruptions could force material routing changes. Without it, Asian agent payments would fragment immediately."},{"layer":"L0","id":"gnosis","name":"Gnosis","status":"live","description":"EVM chain optimized for stablecoin transactions. Home of Safe smart accounts; widely used in agent treasury setups.","launched":"2018","tags":["open-source","onchain","developer"],"url":"https://www.gnosis.io","x":"gnosischain","docs":"https://docs.gnosischain.com","editorial":"Gnosis has become the default settlement layer for agent treasuries by combining stablecoin optimization with Safe account abstraction, reducing friction in multi-signature fund management—essential as autonomous systems control capital. Its narrow moat depends on being reliably boring; any L1 improving stablecoin UX or Safe integration could displace it. The critical risk: agent payments may fragment across chains faster than standardization emerges, commoditizing Gnosis's infrastructure advantage."},{"layer":"L0","id":"near","name":"NEAR","status":"early","description":"Layer 1 with account abstraction native to the protocol. Early-stage but architecturally well-suited for agent payment patterns.","launched":"2020-10","tags":["open-source","onchain","developer"],"url":"https://near.org","x":"NEARProtocol","docs":"https://docs.near.org","editorial":"NEAR's native account abstraction enables agents to execute multi-step payments within a single account, reducing friction versus competing L1s. Yet modest TVL and adoption suggest NEAR hasn't captured agent payment volume despite this technical advantage, risking theoretical soundness without practical network effects."},{"layer":"L0","id":"avalanche","name":"Avalanche","status":"live","description":"High-throughput EVM-compatible L1 with subnet architecture. Used for enterprise agent payment settlement.","launched":"2020-09","tags":["open-source","onchain","developer"],"url":"https://www.avax.network","x":"avax","docs":"https://docs.avax.network","editorial":"Avalanche's subnets lack purpose-built agent tooling, suggesting retrofit rather than native design for agent payment settlement. The architecture competes on throughput and cost but faces adoption headwinds: enterprises may prefer consolidated settlement on Ethereum or Solana over fragmented subnet liquidity and separate validator sets. Real agent payment volume will determine whether sovereign isolation outweighs settlement consolidation."},{"layer":"L0","id":"kite","name":"Kite","status":"live","url":"https://gokite.ai","description":"EVM-compatible Layer 1 purpose-built for autonomous AI agent payment settlement ($33M+, PayPal Ventures). Provides programmable spend rules and coordination infrastructure for agent commerce.","launched":"2024","tags":["developer","onchain"],"x":"GoKiteAI","docs":"https://docs.gokite.ai","editorial":"Kite is building an L1 to solve agent-to-agent payments at scale, betting that autonomous treasury coordination requires distinct execution primitives rather than general computation. PayPal Ventures' backing signals institutional confidence in agent commerce, though it remains unclear whether Kite's settlement-layer approach outcompetes simpler adoption on existing infrastructure."},{"layer":"L0","id":"skale","name":"SKALE","status":"live","url":"https://skale.space","description":"Gas-free Ethereum L2 network. Zero gas fees make it practical for high-frequency agent micropayment settlement.","launched":"2020","tags":["open-source","onchain","developer"],"x":"SkaleNetwork","docs":"https://docs.skale.network","chain":"Ethereum","editorial":"SKALE's zero-gas settlement eliminates transaction costs that would otherwise exceed micropayment values—a rare infrastructure breakthrough that enables rather than optimizes payments. As an Ethereum L2, it trades security for throughput, a consequential tradeoff for financial primitives. Live since 2020 with proven technical viability, sparse agent framework adoption suggests the problem either isn't yet real at scale or lacks a natural venue."},{"layer":"L0","id":"stellar","name":"Stellar","status":"live","description":"Open network for storing and moving money. Supports x402 as a payment protocol for AI agents and internet commerce, enabling stablecoin payments on the Stellar network.","url":"https://stellar.org","x":"StellarOrg","chain":"Stellar","tags":["open-source","onchain","developer"],"editorial":"One of the few L0 chains with a native x402 facilitator and sponsored fees. Built-in USDC support via Circle. ~5-second finality.","launched":"2014","added":"2026-03-27"}]}],"consolidation":[{"acquirer":"Capital One","target":"Brex","value":"$5.15B","period":"2025-2026"},{"acquirer":"Mastercard","target":"BVNK","value":"$1.8B","period":"2025-2026"},{"acquirer":"Stripe","target":"Bridge","value":"$1.1B","period":"2025-2026"},{"acquirer":"LayerZero","target":"Stargate","value":"$120M","period":"2025-2026"},{"acquirer":"Stripe","target":"Privy","period":"2025-2026"},{"acquirer":"Fireblocks","target":"Dynamic","period":"2025-2026"},{"acquirer":"Arbitrum","target":"ZeroDev","period":"2025-2026"}],"vertical_integration":[{"name":"Coinbase","color":"#0052ff","layers":["L0","L1","L2","L3","L4"]},{"name":"Stripe","color":"#635bff","layers":["L0","L1","L2","L3","L4"]},{"name":"Circle","color":"#00a868","layers":["L0","L1","L2","L3"]},{"name":"Google","color":"#c0392b","layers":["L3","L4"]},{"name":"MoonPay","color":"#7b61ff","layers":["L1","L2","L3"]}],"status_legend":{"live":"Shipped and in production","early":"Live but early-stage or limited access","announced":"Publicly announced, not yet shipped","acquired":"Acquired — operating under parent company"}}</script>

<script>
(function() {
  var DATA = JSON.parse(document.getElementById('aps-data').textContent);
  var LAYER_ORDER = ['L5','L4','L3','L2','L1','L0'];
  var LAYER_DESC = {
    L5: 'What gets bought and why',
    L4: 'May this agent spend',
    L3: 'How the payment flows',
    L2: 'Which chain, token, rail',
    L1: 'Where the keys live',
    L0: 'Where transactions land'
  };
  var DEFAULTS = { L5:'elizaos', L4:'stripe-spts', L3:'x402', L2:'kibble', L1:'coinbase-agentic-wallets', L0:'base' };

  var layerMap = {};
  DATA.layers.forEach(function(l) { layerMap[l.id] = l; });

  var selects = {};
  var layersEl = document.getElementById('trace-layers');

  LAYER_ORDER.forEach(function(lid) {
    var layer = layerMap[lid];
    if (!layer) return;

    var row = document.createElement('div');
    row.className = 'trace-row';

    // Label column
    var labelDiv = document.createElement('div');
    labelDiv.className = 'trace-layer-label';

    var nSpan = document.createElement('div');
    nSpan.className = 'trace-layer-n';
    nSpan.textContent = lid;

    var nameSpan = document.createElement('div');
    nameSpan.className = 'trace-layer-name';
    nameSpan.textContent = layer.name;

    var qSpan = document.createElement('div');
    qSpan.className = 'trace-layer-q';
    qSpan.textContent = LAYER_DESC[lid] || '';

    labelDiv.appendChild(nSpan);
    labelDiv.appendChild(nameSpan);
    labelDiv.appendChild(qSpan);

    // Select column
    var selectWrap = document.createElement('div');
    selectWrap.className = 'trace-select-wrap';

    var sel = document.createElement('select');
    sel.className = 'trace-select';
    sel.dataset.layer = lid;

    layer.projects.forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      if (p.id === DEFAULTS[lid]) opt.selected = true;
      sel.appendChild(opt);
    });

    var descEl = document.createElement('div');
    descEl.className = 'trace-proj-desc';
    descEl.id = 'desc-' + lid;

    selectWrap.appendChild(sel);
    selectWrap.appendChild(descEl);

    selects[lid] = { sel: sel, desc: descEl, layer: layer };
    sel.addEventListener('change', function() { renderCard(); updateDesc(lid); });

    row.appendChild(labelDiv);
    row.appendChild(selectWrap);
    layersEl.appendChild(row);

    updateDesc(lid);
  });

  function updateDesc(lid) {
    var entry = selects[lid];
    if (!entry) return;
    var sel = entry.sel;
    var project = entry.layer.projects.find(function(p) { return p.id === sel.value; });
    if (project && project.description) {
      entry.desc.textContent = project.description;
    } else {
      entry.desc.textContent = '';
    }
  }

  function clearEl(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function renderCard() {
    var cardEl = document.getElementById('trace-card-rows');
    clearEl(cardEl);

    LAYER_ORDER.forEach(function(lid, i) {
      var entry = selects[lid];
      if (!entry) return;
      var project = entry.layer.projects.find(function(p) { return p.id === entry.sel.value; });
      if (!project) return;

      var cardRow = document.createElement('div');
      cardRow.className = 'trace-card-row';

      var nEl = document.createElement('div');
      nEl.className = 'trace-card-n';
      nEl.textContent = lid;

      var infoEl = document.createElement('div');
      infoEl.className = 'trace-card-info';

      var nameEl = document.createElement('a');
      nameEl.className = 'trace-card-name';
      nameEl.textContent = project.name;
      nameEl.href = '/' + project.id;
      infoEl.appendChild(nameEl);

      if (project.description) {
        var d = document.createElement('div');
        d.className = 'trace-card-desc';
        var t = project.description;
        d.textContent = t.length > 75 ? t.slice(0, 72) + '...' : t;
        infoEl.appendChild(d);
      }

      cardRow.appendChild(nEl);
      cardRow.appendChild(infoEl);
      cardEl.appendChild(cardRow);

      if (i < LAYER_ORDER.length - 1) {
        var conn = document.createElement('div');
        conn.className = 'trace-connector';
        conn.textContent = '|';
        cardEl.appendChild(conn);
      }
    });
  }

  document.getElementById('trace-copy').addEventListener('click', function() {
    var lines = ['My agent payment stack:', ''];
    LAYER_ORDER.forEach(function(lid) {
      var entry = selects[lid];
      if (!entry) return;
      var project = entry.layer.projects.find(function(p) { return p.id === entry.sel.value; });
      if (!project) return;
      var desc = project.description ? ' \u2014 ' + (project.description.length > 55 ? project.description.slice(0, 52) + '...' : project.description) : '';
      lines.push(lid + ' ' + entry.layer.name + ': ' + project.name + desc);
    });
    lines.push('');
    lines.push('agentpaymentsstack.com/trace');
    navigator.clipboard.writeText(lines.join('\n')).then(function() {
      var btn = document.getElementById('trace-copy');
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1800);
    });
  });

  renderCard();
}());
</script>

</script>
