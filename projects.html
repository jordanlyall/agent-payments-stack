<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Profile — Agent Payments Stack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --text: #f0f0f0;
    --secondary: #999;
    --muted: #666;
    --faint: #1e1e1e;
    --surface: #161616;
    --early: #d4a840;
    --ann: #555;
    --acq: #e8694a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv01','cv02','ss01';
  }

  .page { width: 1200px; margin: 0 auto; padding: 48px 56px 64px; }

  /* Breadcrumb */
  .crumb {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .crumb a { color: var(--muted); text-decoration: none; }
  .crumb a:hover { color: var(--secondary); }
  .crumb-sep { color: var(--faint); }

  /* Profile header */
  .prof-hdr {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--faint);
  }

  .prof-name {
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1.5px;
  }

  .prof-layer {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .prof-desc {
    font-size: 15px;
    color: var(--secondary);
    line-height: 1.65;
    max-width: 580px;
    margin-top: 14px;
  }

  /* Status badge */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-live     { background: rgba(240,240,240,0.06); color: var(--text); }
  .badge-early    { background: rgba(212,168,64,0.1); color: var(--early); border: 1px solid rgba(212,168,64,0.2); }
  .badge-announced{ background: transparent; color: var(--ann); border: 1px dashed rgba(255,255,255,0.12); }
  .badge-acquired { background: rgba(232,105,74,0.1); color: var(--acq); }
  .badge-hack     { background: rgba(120,80,220,0.12); color: #a78bfa; border: 1px solid rgba(120,80,220,0.2); font-size: 10px; }

  /* Layer context */
  .layer-ctx {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 20px;
    padding: 10px 14px;
    background: var(--faint);
    border-radius: 6px;
    border-left: 2px solid #333;
  }

  /* Hero metric */
  .hero-metric {
    display: flex;
    gap: 32px;
    align-items: flex-end;
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--faint);
  }
  .hero-stat { flex-shrink: 0; }
  .hero-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--text);
  }
  .hero-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 6px;
  }
  .hero-note { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* Visit website CTA */
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--text);
    color: var(--bg);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cta-btn:hover { opacity: 0.85; }

  /* Chain tags */
  .chain-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .chain-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    font-size: 11px;
    color: var(--secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  .chain-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Meta grid */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px;
    background: var(--faint);
    border: 1px solid var(--faint);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .meta-cell { background: var(--bg); padding: 18px 20px; }

  .meta-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .meta-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .meta-note { font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* Tags */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }

  .tag {
    display: inline-flex;
    padding: 3px 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 4px;
    font-size: 11px;
    color: var(--secondary);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Section */
  .section { margin-bottom: 32px; }

  .section-title {
    font-size: 11px;
    font-weight: 650;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* GitHub */
  .gh-row {
    display: flex;
    gap: 24px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--faint);
  }
  .gh-row a { font-size: 13px; color: var(--secondary); text-decoration: none; }
  .gh-row a:hover { color: var(--text); }
  .gh-stat { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .license-warn {
    font-size: 12px;
    color: var(--early);
    background: rgba(212,168,64,0.06);
    border: 1px solid rgba(212,168,64,0.12);
    border-radius: 6px;
    padding: 10px 14px;
    margin-top: 10px;
  }

  /* History */
  .history-list { list-style: none; }
  .history-list li {
    font-size: 13px;
    color: var(--secondary);
    padding: 10px 0;
    border-bottom: 1px solid var(--faint);
    display: flex;
    gap: 12px;
    align-items: baseline;
  }
  .history-list li:last-child { border-bottom: none; }
  .hist-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .hist-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--acq); margin-left: auto; }

  /* External link */
  .ext-link {
    margin-top: 8px;
    font-size: 13px;
  }
  .ext-link a { color: var(--secondary); text-decoration: none; }
  .ext-link a:hover { color: var(--text); }

  /* Footer */
  .foot {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--faint);
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  .foot b { color: var(--text); font-weight: 600; }
  .foot a { color: inherit; text-decoration: none; opacity: 0.5; }
  .foot a:hover { opacity: 0.8; }

  /* Not found */
  .not-found { text-align: center; padding: 80px 0; color: var(--muted); }
  .not-found a { color: var(--secondary); }

  /* Favicon / logo */
  .prof-logo {
    position: relative;
    width: 44px; height: 44px;
    border-radius: 10px;
    overflow: hidden;
    background: var(--faint);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-bottom: 14px;
  }
  .prof-logo img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 8px;
  }
  .prof-logo-letter {
    font-size: 18px; font-weight: 700;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Links row */
  .links-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 20px;
  }
  .link-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px;
    border: 1px solid var(--faint);
    border-radius: 6px;
    font-size: 12px;
    color: var(--secondary);
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .link-btn:hover { border-color: var(--secondary); color: var(--text); }
  .link-btn-label { opacity: 0.45; margin-right: 2px; }

  /* Siblings */
  .siblings {
    margin-top: 40px;
    padding-top: 28px;
    border-top: 1px solid var(--faint);
  }
  .siblings-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }
  .siblings-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .sibling-chip {
    display: inline-block;
    padding: 5px 12px;
    background: var(--faint);
    border-radius: 6px;
    font-size: 12px;
    color: var(--secondary);
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .sibling-chip:hover { background: #222; color: var(--text); }
  .rel-chip { display: inline-flex; align-items: center; gap: 6px; }
  .rel-layer {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.4px;
  }
</style>
</head>
<body>
<div class="page">
  <div id="root"></div>
  <div class="foot">
    <div><b>@jordanlyall</b> &middot; agentpaymentsstack.com</div>
    <div>
      <a href="/">The Agent Payments Stack</a>
      &middot; <a href="/data.json">data.json</a>
      &middot; <a href="/llms.txt">llms.txt</a>
    </div>
  </div>
</div>

<script>
// All values pass through esc() before DOM insertion. Data source is static authored JSON, not user input.
document.addEventListener('DOMContentLoaded', function () {
  var LAYER_NAMES = {
    L0: 'Settlement', L1: 'Wallet & Key Management',
    L2: 'Routing & Abstraction', L3: 'Payment Protocol',
    L4: 'Governance & Policy', L5: 'Application'
  };

  var LAYER_DESC = {
    L0: 'The chains where agent transactions settle — Base, Solana, Ethereum, Arbitrum.',
    L1: 'Where agent keys and wallets live — MPC custody, smart wallets, key management.',
    L2: 'Cross-chain routing, bridging, and token swaps for agent transactions.',
    L3: 'The payment standards agents use to request and receive payment — x402, MPP, L402.',
    L4: 'Spend controls, authorization policies, and guardrails for autonomous agents.',
    L5: 'Applications and platforms deploying agents that spend money to get things done.'
  };

  var HACKATHON_HOSTS = ['synthesis.mandate.md'];

  function isHackathon(url) {
    if (!url) return false;
    try {
      return HACKATHON_HOSTS.some(function(h) { return new URL(url).hostname === h; });
    } catch(e) { return false; }
  }

  function esc(s) {
    return s == null ? '' : String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function getSlug() {
    var path = window.location.pathname;
    return path.replace(/^\//, '').split('?')[0] || null;
  }

  function findProject(layers, id) {
    for (var i = 0; i < layers.length; i++) {
      var layer = layers[i];
      for (var j = 0; j < layer.projects.length; j++) {
        if (layer.projects[j].id === id) {
          var p = layer.projects[j];
          if (!p.layer) p.layer = layer.id;
          return p;
        }
      }
    }
    return null;
  }

  function badgeClass(status) {
    return 'badge badge-' + (status || 'live');
  }

  function renderNotFound(id) {
    document.title = 'Not Found — Agent Payments Stack';
    document.getElementById('root').innerHTML =
      '<div class="not-found">' +
      '<p style="font-size:14px;margin-bottom:12px;">Project not found: <code>' + esc(id) + '</code></p>' +
      '<p><a href="/">Back to the stack &rarr;</a></p>' +
      '</div>';
  }

  function getDomain(url) {
    if (!url) return null;
    try { return new URL(url).hostname.replace(/^www\./, ''); } catch(e) { return null; }
  }

  function getSiblings(layers, currentId, currentLayer, limit) {
    for (var i = 0; i < layers.length; i++) {
      if (layers[i].id === currentLayer) {
        return layers[i].projects.filter(function(p) { return p.id !== currentId; }).slice(0, limit);
      }
    }
    return [];
  }

  function renderProfile(p, layers) {
    // 1. Dynamic meta description
    var metaDesc = document.querySelector('meta[name="description"]');
    if (!metaDesc) { metaDesc = document.createElement('meta'); metaDesc.name = 'description'; document.head.appendChild(metaDesc); }
    metaDesc.content = p.description ? p.name + ' — ' + p.description + ' Part of the Agent Payments Stack.' : p.name + ' — Agent Payments Stack profile.';

    document.title = esc(p.name) + ' — Agent Payments Stack';

    var layerLabel = p.layer
      ? esc(p.layer) + ' &mdash; ' + esc(LAYER_NAMES[p.layer] || '')
      : '';

    var crumb =
      '<div class="crumb">' +
      '<a href="/">Agent Payments Stack</a>' +
      '<span class="crumb-sep">/</span>' +
      (p.layer ? '<span>' + esc(LAYER_NAMES[p.layer] || p.layer) + '</span><span class="crumb-sep">/</span>' : '') +
      '<span>' + esc(p.name) + '</span>' +
      '</div>';

    // 2. Favicon — use url, fall back to github url for domain
    var faviconUrl = p.url || (p.github && p.github.url);
    var domain = getDomain(p.url) || getDomain(p.github && p.github.url);
    var logoHtml =
      '<div class="prof-logo">' +
      '<span class="prof-logo-letter">' + esc(p.name.charAt(0)) + '</span>' +
      (domain ? '<img src="https://www.google.com/s2/favicons?domain=' + esc(domain) + '&sz=64" alt="" data-favicon="1">' : '') +
      '</div>';

    // Hackathon badge
    var hackathon = isHackathon(p.url);
    var badges =
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">' +
      '<span class="' + badgeClass(p.status) + '">' + esc(p.status || 'live') + '</span>' +
      (hackathon ? '<span class="badge badge-hack">hackathon</span>' : '') +
      '</div>';

    // Visit website CTA
    var ctaUrl = p.url || (p.github && p.github.url);
    var ctaHtml = ctaUrl
      ? '<a class="cta-btn" href="' + esc(ctaUrl) + '" target="_blank" rel="noopener">Visit website &rarr;</a>'
      : '';

    var hdr =
      '<div class="prof-hdr">' +
      '<div>' +
      logoHtml +
      '<div class="prof-name">' + esc(p.name) + '</div>' +
      (layerLabel ? '<div class="prof-layer">' + layerLabel + '</div>' : '') +
      (p.description ? '<p class="prof-desc">' + esc(p.description) + '</p>' : '') +
      '</div>' +
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:12px;">' +
      badges + ctaHtml +
      '</div>' +
      '</div>';

    // Layer context blurb
    var layerCtx = (p.layer && LAYER_DESC[p.layer])
      ? '<div class="layer-ctx">' + esc(LAYER_DESC[p.layer]) + '</div>'
      : '';

    // Hero metric — volume (big) or GitHub stars
    var heroHtml = '';
    if (p.volume && p.volume['30d'] && p.volume['30d'] !== 'tracked') {
      heroHtml =
        '<div class="hero-metric">' +
        '<div class="hero-stat">' +
        '<div class="hero-val">' + esc(p.volume['30d']) + '</div>' +
        '<div class="hero-label">Volume (30d)</div>' +
        (p.volume.source ? '<div class="hero-note">' + esc(p.volume.source) + '</div>' : '') +
        '</div>' +
        '</div>';
    } else if (p.github && p.github.stars) {
      heroHtml =
        '<div class="hero-metric">' +
        '<div class="hero-stat">' +
        '<div class="hero-val">' + esc(p.github.stars.toLocaleString()) + '</div>' +
        '<div class="hero-label">GitHub Stars</div>' +
        '</div>' +
        '</div>';
    }

    // Chain tags
    var CHAIN_COLORS = { Base:'#0052ff', Solana:'#9945ff', Ethereum:'#627eea', Arbitrum:'#12aaff', Celo:'#35d07f', multi:'#888' };
    var chainHtml = '';
    if (p.chain) {
      var chains = p.chain.split(/[,\/]/).map(function(c) { return c.trim(); });
      chainHtml = '<div class="chain-row">' +
        chains.map(function(c) {
          var col = CHAIN_COLORS[c] || '#888';
          return '<span class="chain-tag"><span class="chain-dot" style="background:' + col + '"></span>' + esc(c) + '</span>';
        }).join('') +
        '</div>';
    }

    // Meta cells (secondary stats — not volume/stars, those are in hero)
    var cells = [];
    if (p.metadata && !p.volume) cells.push({ label: 'Activity', val: p.metadata });
    if (p.launched) cells.push({ label: 'Launched', val: p.launched });
    if (p.funding) cells.push({ label: 'Funding', val: p.funding });
    if (p.github && p.github.stars && !heroHtml.includes('GitHub Stars')) {
      cells.push({ label: 'Stars', val: p.github.stars.toLocaleString() });
    }

    var metaHtml = cells.length
      ? '<div class="meta-grid">' +
        cells.map(function(c) {
          return '<div class="meta-cell">' +
            '<div class="meta-label">' + esc(c.label) + '</div>' +
            '<div class="meta-val">' + esc(c.val) + '</div>' +
            (c.note ? '<div class="meta-note">' + esc(c.note) + '</div>' : '') +
            '</div>';
        }).join('') + '</div>'
      : '';

    // Tags
    var tagsHtml = (p.tags && p.tags.length)
      ? '<div class="tags">' +
        p.tags.map(function(t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') +
        '</div>'
      : '';

    // Links row (secondary links: x, docs, github — website is now the CTA button)
    var linkBtns = [];
    if (p.x) {
      var handle = p.x.replace(/^@/, '');
      linkBtns.push('<a class="link-btn" href="https://x.com/' + esc(handle) + '" target="_blank" rel="noopener"><span class="link-btn-label">x</span>@' + esc(handle) + '</a>');
    }
    if (p.docs) {
      linkBtns.push('<a class="link-btn" href="' + esc(p.docs) + '" target="_blank" rel="noopener"><span class="link-btn-label">docs</span>' + esc(getDomain(p.docs) || 'docs') + ' &rarr;</a>');
    }
    if (p.github && p.github.url) {
      linkBtns.push('<a class="link-btn" href="' + esc(p.github.url) + '" target="_blank" rel="noopener"><span class="link-btn-label">gh</span>' + esc(p.github.url.replace('https://github.com/', '')) + '</a>');
    }
    var linksHtml = linkBtns.length ? '<div class="links-row">' + linkBtns.join('') + '</div>' : '';

    // GitHub license warning
    var ghHtml = '';
    if (p.github && p.github.license && p.github.license.indexOf('LZBL') !== -1) {
      ghHtml = '<div class="section"><div class="license-warn">Dual-licensed: MIT (non-commercial) + LZBL-1.2. Commercial use requires a separate agreement.</div></div>';
    }

    // History
    var histHtml = '';
    if (p.history && p.history.length) {
      histHtml =
        '<div class="section">' +
        '<div class="section-title">History</div>' +
        '<ul class="history-list">' +
        p.history.map(function(h) {
          var label = h.event === 'acquired'
            ? 'Acquired by ' + esc(h.acquirer || h.target)
            : esc(h.event);
          return '<li>' +
            '<span class="hist-date">' + esc(h.date || '') + '</span>' +
            '<span>' + label + '</span>' +
            (h.value ? '<span class="hist-val">' + esc(h.value) + '</span>' : '') +
            '</li>';
        }).join('') +
        '</ul></div>';
    }

    // Used by — reverse lookup: which projects list this one in their related[]
    var usedByHtml = '';
    if (layers) {
      var usedBy = layers.flatMap(function(l) { return l.projects; }).filter(function(q) {
        return q.related && q.related.indexOf(p.id) !== -1;
      });
      if (usedBy.length) {
        usedByHtml =
          '<div class="siblings">' +
          '<div class="siblings-title">Used by</div>' +
          '<div class="siblings-chips">' +
          usedBy.map(function(u) {
            var layerTag = u.layer ? '<span class="rel-layer">' + esc(u.layer) + '</span>' : '';
            return '<a class="sibling-chip rel-chip" href="/' + esc(u.id) + '">' + layerTag + esc(u.name) + '</a>';
          }).join('') +
          '</div></div>';
      }
    }

    // Works with
    var relatedHtml = '';
    if (p.related && p.related.length && layers) {
      var relProjects = p.related.map(function(rid) { return findProject(layers, rid); }).filter(Boolean);
      if (relProjects.length) {
        relatedHtml =
          '<div class="siblings">' +
          '<div class="siblings-title">Works with</div>' +
          '<div class="siblings-chips">' +
          relProjects.map(function(r) {
            var layerTag = r.layer ? '<span class="rel-layer">' + esc(r.layer) + '</span>' : '';
