<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Profile — Agent Payments Stack</title>
<meta name="description" content="Project profile on the Agent Payments Stack — 134 projects across settlement, wallets, routing, protocols, governance, and applications.">
<link rel="canonical" href="https://agentpaymentsstack.com">
<meta property="og:title" content="Protocol Profile — Agent Payments Stack">
<meta property="og:description" content="Project profile on the Agent Payments Stack — 134 projects across settlement, wallets, routing, protocols, governance, and applications.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://agentpaymentsstack.com/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0d0c0b;
    --text: #edebe7;
    --secondary: #98948f;
    --muted: #685e58;
    --faint: #201e1b;
    --early: #c99e32;
    --ann: #524e49;
    --acq: #d9613f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01';
  }

  .page { max-width: 1100px; margin: 0 auto; padding: 32px 56px 64px; }

  /* Breadcrumb */
  .crumb {
    font-size: 11.5px; color: var(--muted); margin-bottom: 40px;
    display: flex; align-items: center; gap: 8px; font-weight: 450;
  }
  .crumb a { color: var(--muted); text-decoration: none; transition: color 0.12s; }
  .crumb a:hover { color: var(--secondary); }
  .crumb-sep { opacity: 0.3; }

  /* Two-column layout */
  .prof-layout {
    display: grid;
    grid-template-columns: 1fr 248px;
    gap: 0 52px;
    align-items: start;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--faint);
    margin-bottom: 0;
  }

  /* Left — identity */
  .prof-name-row { display: flex; align-items: center; gap: 14px; }
  .prof-favicon { width: 44px; height: 44px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); object-fit: contain; flex-shrink: 0; }

  .prof-name { font-family: 'DM Serif Display', serif; font-size: 54px; font-weight: 400; line-height: 1; letter-spacing: -1px; }
  /* Layer pill — single compact position indicator */
  .layer-pill {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .layer-pill-id {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px; padding: 2px 6px; color: var(--text); font-weight: 600;
  }

  .prof-desc { font-size: 15px; color: var(--secondary); line-height: 1.65; max-width: 500px; margin-top: 16px; }

  .layer-strip { display: none; } /* replaced by layer-pill */

  /* APS Take — editorial voice, no box */
  .aps-take {
    margin-top: 18px;
    max-width: 500px;
  }
  .aps-take-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 6px; font-weight: 600; opacity: 0.6;
  }
  .aps-take-text {
    font-size: 14px; color: var(--text); line-height: 1.7; font-style: italic; opacity: 0.8;
  }

  /* Right — sidebar */
  .prof-aside { display: flex; flex-direction: column; padding-top: 6px; }

  .aside-status-block { margin-bottom: 16px; }
  .aside-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }

  .badge {
    display: inline-flex; align-items: center;
    padding: 4px 9px; border-radius: 3px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
  }
  .badge-live { background: rgba(237,235,231,0.06); color: var(--secondary); }
  .badge-early { background: rgba(201,158,50,0.1); color: var(--early); border: 1px solid rgba(201,158,50,0.2); }
  .badge-announced { background: transparent; color: var(--ann); border: 1px dashed rgba(255,255,255,0.12); }
  .badge-acquired { background: rgba(217,97,63,0.1); color: var(--acq); }
  .badge-hack { background: rgba(120,80,220,0.12); color: #a78bfa; border: 1px solid rgba(120,80,220,0.2); font-size: 9.5px; }

  .cta-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 16px; background: rgba(237,235,231,0.92); color: #0d0c0b;
    border-radius: 4px; font-size: 12.5px; font-weight: 600;
    text-decoration: none; transition: background 0.15s; width: 100%;
    letter-spacing: 0.01em;
  }
  .cta-btn:hover { background: var(--text); }

  .aside-divider { height: 1px; background: var(--faint); margin: 14px 0; }

  /* Metric */
  .aside-metric-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 34px; font-weight: 600; letter-spacing: -1.5px; line-height: 1; color: var(--text);
  }
  .aside-metric-label {
    font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-top: 5px; font-weight: 500;
  }
  .aside-metric-val-sm {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 600; letter-spacing: -0.5px; line-height: 1; color: var(--text);
  }
  .vol-trend-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 9px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 2px 6px; border-radius: 3px; margin-top: 6px;
  }
  .vol-trend-up { background: rgba(74,222,128,0.12); color: #4ade80; }
  .vol-trend-down { background: rgba(248,113,113,0.12); color: #f87171; }
  .vol-tracking { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase; margin-top: 6px; }

  /* Chains */
  .aside-chains { display: flex; flex-wrap: wrap; gap: 5px; }
  .chain-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 3px; font-size: 10.5px; color: var(--secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  .chain-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* Links */
  .aside-links { display: flex; flex-direction: column; gap: 5px; }
  .aside-link {
    display: flex; align-items: center; gap: 9px;
    font-size: 11.5px; text-decoration: none; color: var(--secondary);
    transition: color 0.12s; padding: 2px 0;
  }
  .aside-link:hover { color: var(--text); }
  .aside-link-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--muted); letter-spacing: 0.06em;
    text-transform: uppercase; width: 26px; flex-shrink: 0;
  }

  /* Meta rows */
  .aside-meta { display: flex; flex-direction: column; gap: 5px; }
  .aside-meta-row { display: flex; align-items: baseline; gap: 9px; }
  .aside-meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--muted); letter-spacing: 0.06em;
    text-transform: uppercase; width: 52px; flex-shrink: 0;
  }
  .aside-meta-val { font-size: 12px; color: var(--secondary); font-weight: 500; }

  /* Tags */
  .aside-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    display: inline-flex; padding: 2px 7px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px; font-size: 10.5px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Layer stat line */
  .layer-stat-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; color: var(--muted); letter-spacing: 0.06em;
    text-transform: uppercase; margin-top: 8px; max-width: 500px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .lsl-seg { display: flex; align-items: center; gap: 4px; }
  .lsl-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .lsl-dot-live { background: #4ade80; }
  .lsl-dot-early { background: var(--early); }
  .lsl-dot-announced { background: var(--ann); }

  /* APS Take — editorial callout */
  .aps-take {
    margin-top: 22px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 2px solid rgba(237,235,231,0.25);
    border-radius: 0 4px 4px 0;
    max-width: 500px;
  }
  .aps-take-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 7px; font-weight: 600;
  }
  .aps-take-text {
    font-size: 13.5px; color: var(--secondary); line-height: 1.7;
  }

  /* Mobile status row (hidden on desktop, shown on mobile) */
  .prof-mobile-meta {
    display: none;
    margin-top: 18px;
    flex-direction: column;
    gap: 10px;
  }
  .prof-mobile-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .prof-mobile-cta {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 14px; background: rgba(237,235,231,0.92); color: #0d0c0b;
    border-radius: 4px; font-size: 12.5px; font-weight: 600;
    text-decoration: none; transition: background 0.15s;
    letter-spacing: 0.01em; width: 100%;
  }
  .prof-mobile-cta:hover { background: var(--text); }
  .prof-mobile-metric { display: flex; flex-direction: column; gap: 2px; }
  .prof-mobile-metric-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text);
  }
  .prof-mobile-metric-label {
    font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 500;
  }

  /* Below-fold */
  .prof-below {}

  .layer-ctx {
    font-size: 12.5px; color: var(--muted); font-style: italic;
    padding: 20px 0; border-bottom: 1px solid var(--faint); line-height: 1.55;
  }

  .license-warn {
    font-size: 12px; color: var(--early);
    background: rgba(201,158,50,0.06); border: 1px solid rgba(201,158,50,0.12);
    border-radius: 4px; padding: 10px 14px; margin: 16px 0;
  }
  .editorial-note {
    font-size: 12px; color: var(--secondary);
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-left: 2px solid var(--muted);
    border-radius: 0 4px 4px 0; padding: 10px 14px; margin: 16px 0;
  }

  /* History */
  .history-list { list-style: none; }
  .history-item {
    font-size: 13px; color: var(--secondary);
    padding: 10px 0; border-bottom: 1px solid var(--faint);
    display: flex; gap: 12px; align-items: baseline;
  }
  .history-item:last-child { border-bottom: none; }
  .hist-date { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--muted); flex-shrink: 0; }
  .hist-val { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 600; color: var(--acq); margin-left: auto; }

  /* Relations */
  .rel-section { padding: 22px 0; border-top: 1px solid var(--faint); }
  .rel-title {
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 13px;
  }
  .rel-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .rel-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 5px; font-size: 12.5px; color: var(--secondary);
    text-decoration: none; transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .rel-chip:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); color: var(--text); }
  .rel-chip-acq { border-color: rgba(217,97,63,0.25); background: rgba(217,97,63,0.06); color: var(--acq); }
  .rel-chip-acq:hover { background: rgba(217,97,63,0.12); border-color: rgba(217,97,63,0.4); color: var(--acq); }
  .rel-chip-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-left: 2px; }
  .rel-layer-tag {
    font-size: 9px; font-family: 'JetBrains Mono', monospace;
    color: var(--muted); background: rgba(255,255,255,0.05);
    padding: 1px 4px; border-radius: 2px; letter-spacing: 0.04em;
  }

  /* Topbar */
  .topbar { border-bottom: 1px solid var(--faint); height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 56px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .topbar-logo { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); text-decoration: none; }
  .topbar-links { display: flex; gap: 18px; align-items: center; }
  .topbar-links a { font-size: 11.5px; color: var(--muted); text-decoration: none; transition: color 0.12s; }
  .topbar-links a:hover { color: var(--secondary); }
  .mob-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 6px; color: var(--text); line-height: 0; }
  .mob-menu-btn .icon-ham { display: block; }
  .mob-menu-btn .icon-x { display: none; }
  .mob-menu-btn.open .icon-ham { display: none; }
  .mob-menu-btn.open .icon-x { display: block; }
  .mob-menu { display: none; position: fixed; top: 50px; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 98; padding: 16px 0; flex-direction: column; border-top: 1px solid var(--faint); overflow-y: auto; }
  .mob-menu.open { display: flex; }
  .mob-menu a { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.02em; color: var(--secondary); text-decoration: none; padding: 16px 24px; border-bottom: 1px solid var(--faint); transition: color 0.1s; }
  .mob-menu a:first-child { border-top: 1px solid var(--faint); }
  .mob-menu a:hover { color: var(--text); }

  /* Prev / Next */
  .pn-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 4px; border-top: 1px solid var(--faint); margin-top: 8px; gap: 16px; }
  .pn-link { display: flex; flex-direction: column; gap: 3px; text-decoration: none; min-width: 0; }
  .pn-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .pn-name { font-size: 13px; font-weight: 600; color: var(--secondary); transition: color 0.12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pn-link:hover .pn-name { color: var(--text); }
  .pn-next { text-align: right; }
  .pn-spacer { flex: 1; }

  /* Not found */
  .not-found { text-align: center; padding: 80px 0; color: var(--muted); }
  .not-found a { color: var(--secondary); }

  /* Footer */
  .foot {
    margin-top: 48px; padding-top: 16px;
    border-top: 1px solid var(--faint);
    display: flex; justify-content: space-between;
    font-size: 11.5px; color: var(--muted); letter-spacing: 0.01em;
  }
  .foot b { color: var(--text); font-weight: 600; }
  .foot a { color: inherit; text-decoration: none; opacity: 0.5; }
  .foot a:hover { opacity: 0.8; }

  @media (max-width: 900px) {
    .topbar { padding: 0 20px; }
    .topbar-links { display: none; }
    .mob-menu-btn { display: flex; align-items: center; }
    .page { padding: 20px 20px 40px; }
    .prof-layout { grid-template-columns: 1fr; }
    .prof-aside { display: none; }
    .prof-mobile-meta { display: flex; }
    .pn-nav { padding: 16px 0 0; }
    .foot { flex-direction: column; gap: 8px; }
    .aps-take { max-width: 100%; }
    .layer-stat-line { max-width: 100%; }
    .prof-desc { max-width: 100%; }
    .layer-strip { max-width: 100%; }
  }
</style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<nav class="topbar" id="topbar"></nav>
<div class="mob-menu" id="mob-menu"></div>
<script src="/nav.js"></script>

<div class="page">
  <div id="root"></div>
  <div class="foot">
    <div><b>@jordanlyall</b> &middot; agentpaymentsstack.com</div>
    <div>
      <a href="/">The Agent Payments Stack</a>
      &middot; <a href="/data.json">data.json</a>
      &middot; <a href="/llms.txt">llms.txt</a>
    </div>
  </div>
</div>

<script>
// All values pass through esc() before DOM insertion. Data source is static authored JSON, not user input.
document.addEventListener('DOMContentLoaded', function () {
  var LAYER_NAMES = {
    L0: 'Settlement', L1: 'Wallet & Key Management',
    L2: 'Routing & Abstraction', L3: 'Payment Protocol',
    L4: 'Governance & Policy', L5: 'Application'
  };

  var LAYER_DESC = {
    L0: 'The chains where agent transactions settle — Base, Solana, Ethereum, Arbitrum.',
    L1: 'Where agent keys and wallets live — MPC custody, smart wallets, key management.',
    L2: 'Cross-chain routing, bridging, and token swaps for agent transactions.',
    L3: 'The payment standards agents use to request and receive payment — x402, MPP, L402.',
    L4: 'Spend controls, authorization policies, and guardrails for autonomous agents.',
    L5: 'Applications and platforms deploying agents that spend money to get things done.'
  };

  var HACKATHON_HOSTS = ['synthesis.mandate.md'];

  function isHackathon(url) {
    if (!url) return false;
    try {
      return HACKATHON_HOSTS.some(function(h) { return new URL(url).hostname === h; });
    } catch(e) { return false; }
  }

  function esc(s) {
    return s == null ? '' : String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function getSlug() {
    var path = window.location.pathname;
    return path.replace(/^\//, '').split('?')[0] || null;
  }

  function findProject(layers, id) {
    for (var i = 0; i < layers.length; i++) {
      var layer = layers[i];
      for (var j = 0; j < layer.projects.length; j++) {
        if (layer.projects[j].id === id) {
          var p = layer.projects[j];
          if (!p.layer) p.layer = layer.id;
          return p;
        }
      }
    }
    return null;
  }

  function badgeClass(status) {
    return 'badge badge-' + (status || 'live');
  }

  function renderNotFound(id) {
    document.title = 'Not Found — Agent Payments Stack';
    document.getElementById('root').innerHTML =
      '<div class="not-found">' +
      '<p style="font-size:14px;margin-bottom:12px;">Project not found: <code>' + esc(id) + '</code></p>' +
      '<p><a href="/">Back to the stack &rarr;</a></p>' +
      '</div>';
  }

  function getDomain(url) {
    if (!url) return null;
    try { return new URL(url).hostname.replace(/^www\./, ''); } catch(e) { return null; }
  }

  function getSiblings(layers, currentId, currentLayer, limit) {
    for (var i = 0; i < layers.length; i++) {
      if (layers[i].id === currentLayer) {
        return layers[i].projects.filter(function(p) { return p.id !== currentId; }).slice(0, limit);
      }
    }
    return [];
  }

  var CHAIN_COLORS = { Base:'#0052ff', Solana:'#9945ff', Ethereum:'#627eea', Arbitrum:'#12aaff', Polygon:'#8247e5', Avalanche:'#e84142', multi:'#685e58' };

  function mk(tag, cls) { var e = document.createElement(tag); if (cls) e.className = cls; return e; }
  function mkA(href, cls, blank) { var a = mk('a', cls); a.href = href; if (blank) { a.target = '_blank'; a.rel = 'noopener'; } return a; }
  function ap(p) { for (var i=1;i<arguments.length;i++) { var c=arguments[i]; if (c!=null) { if (typeof c==='string') p.appendChild(document.createTextNode(c)); else p.appendChild(c); } } return p; }
  function clr(el) { while(el.firstChild) el.removeChild(el.firstChild); }

  function renderProfile(p, layers) {
    document.title = p.name + ' \u2014 Agent Payments Stack';
    var metaDesc = document.querySelector('meta[name="description"]');
    if (!metaDesc) { metaDesc = document.createElement('meta'); metaDesc.name = 'description'; document.head.appendChild(metaDesc); }
    metaDesc.content = p.description ? p.name + ' \u2014 ' + p.description : p.name + ' \u2014 Agent Payments Stack.';

    var root = document.getElementById('root');
    clr(root);

    // Breadcrumb
    var crumb = mk('div', 'crumb');
    var homeA = mkA('/'); homeA.textContent = 'Agent Payments Stack'; crumb.appendChild(homeA);
    if (p.layer) {
      ap(crumb, mk('span','crumb-sep'), document.createTextNode('/'));
      var ls = mk('span'); ls.textContent = LAYER_NAMES[p.layer] || p.layer; crumb.appendChild(ls);
    }
    ap(crumb, mk('span','crumb-sep'), document.createTextNode('/'));
    var ns = mk('span'); ns.textContent = p.name; crumb.appendChild(ns);
    root.appendChild(crumb);

    // Two-column layout wrapper
    var layout = mk('div', 'prof-layout');
    root.appendChild(layout);

    // ── LEFT: identity ──
    var left = mk('div', 'prof-left');
    layout.appendChild(left);

    var nameRow = mk('div', 'prof-name-row');
    var favDomain = getDomain(p.url);
    var FAV_BLOCKLIST = ['x.com', 'twitter.com', 'github.com', 't.co'];
    if (favDomain && !FAV_BLOCKLIST.some(function(b) { return favDomain === b || favDomain.endsWith('.' + b); })) {
      var favImg = document.createElement('img');
      favImg.className = 'prof-favicon';

(function(){
  var btn = document.getElementById("mob-menu-btn");
  var menu = document.getElementById("mob-menu");
  if (!btn || !menu) return;
  btn.addEventListener("click", function(){
    var open = menu.classList.toggle("open");
    btn.classList.toggle("open", open);
    btn.setAttribute("aria-expanded", open);
  });
  menu.querySelectorAll("a").forEach(function(a){
    a.addEventListener("click", function(){
      menu.classList.remove("open");
      btn.classList.remove("open");
      btn.setAttribute("aria-expanded", "false");
    });
  });
}());
</script>
