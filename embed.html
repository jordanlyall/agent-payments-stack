<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Payments Stack — Embed</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    font-size: 13px;
    padding: 16px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .header-title { font-size: 13px; font-weight: 600; color: #e8e8e8; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.35); }
  .layer { margin-bottom: 14px; }
  .layer-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 7px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    color: #e8e8e8;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    white-space: nowrap;
  }
  .chip:hover { background: rgba(255,255,255,0.1); }
  .chip.early { background: rgba(212,168,64,0.08); border-color: rgba(212,168,64,0.2); color: rgba(212,168,64,0.9); }
  .chip.ann { background: transparent; border: 1px dashed rgba(255,255,255,0.18); color: rgba(255,255,255,0.45); }
  .chip.acq { background: rgba(232,105,74,0.08); border-color: rgba(232,105,74,0.2); color: rgba(232,105,74,0.8); }
  .chip .meta { font-size: 9px; opacity: 0.55; }
  .footer {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer a {
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    font-size: 11px;
  }
  .footer a:hover { color: rgba(255,255,255,0.6); }
  .footer-stats { font-size: 11px; color: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="header">
  <span class="header-title" id="ht">The Agent Payments Stack</span>
  <span class="header-sub" id="hs"></span>
</div>
<div id="content"></div>
<div class="footer">
  <a href="https://agentpaymentsstack.com" target="_blank">agentpaymentsstack.com →</a>
  <span class="footer-stats" id="fs"></span>
</div>
<script>
const params = new URLSearchParams(location.search);
const layerParam = (params.get('layer') || '').toUpperCase();

fetch('/data.json').then(r=>r.json()).then(data=>{
  const layers = layerParam
    ? data.layers.filter(l => l.id === layerParam)
    : [...data.layers].reverse();

  if(layerParam && layers.length) {
    document.getElementById('ht').textContent = layers[0].name + ' — Agent Payments Stack';
    document.getElementById('hs').textContent = layers[0].question;
  } else {
    document.getElementById('hs').textContent = data.description;
  }

  const content = document.getElementById('content');
  let total = 0;

  layers.forEach(layer => {
    const div = document.createElement('div');
    div.className = 'layer';
    if(!layerParam) {
      const lbl = document.createElement('div');
      lbl.className = 'layer-label';
      lbl.textContent = layer.id + ' · ' + layer.name;
      div.appendChild(lbl);
    }
    const chips = document.createElement('div');
    chips.className = 'chips';
    layer.projects.forEach(p => {
      const el = p.url ? document.createElement('a') : document.createElement('span');
      el.className = 'chip' + (p.status === 'early' ? ' early' : p.status === 'announced' ? ' ann' : p.status === 'acquired' ? ' acq' : '');
      if(p.url) { el.href = p.url; el.target = '_blank'; el.rel = 'noopener'; }
      el.textContent = p.name;
      if(p.metadata) {
        const m = document.createElement('span');
        m.className = 'meta';
        m.textContent = p.metadata;
        el.appendChild(m);
      }
      chips.appendChild(el);
      total++;
    });
    div.appendChild(chips);
    content.appendChild(div);
  });

  document.getElementById('fs').textContent = total + ' project' + (total !== 1 ? 's' : '');
});
</script>
</body>
</html>
